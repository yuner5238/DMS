<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库资产管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Windows 11 风格配色 */
        :root {
            --primary: #0067c0;
            --primary-hover: #005a9e;
            --primary-light: #60cdff;
            --secondary: #5c5c5c;
            --success: #0f7b0f;
            --success-bg: #dff6dd;
            --success-border: #4caf50;
            --warning: #9d5b00;
            --warning-bg: #fff4ce;
            --warning-border: #ffb900;
            --danger: #c42b1c;
            --danger-bg: #fde7e9;
            --info: #0078d4;
            --info-bg: #e5f1fb;
            --bg-main: #f3f3f3;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #424242;
            --text-muted: #757575;
            --border-color: #e5e5e5;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        *, *::before, *::after { box-sizing: border-box; font-family: 'Segoe UI', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; }
        html, body { width: 100%; height: 100%; min-height: 100%; margin: 0; padding: 0; }
        body { background: var(--bg-main); min-height: 100%; }
        .container-fluid { width: 100%; height: 100%; min-height: 100%; margin: 0; padding: 0; }

        /* 移动端 body 无 padding */
        @media (max-width: 768px) {
            body {
                padding: 0 !important;
                margin: 0 !important;
            }
        }

        .main-card {
            background: var(--bg-card);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
            min-height: 100%;
            height: 100%;
        }

        .main-card > .row {
            display: flex;
            flex-wrap: nowrap;
            min-height: 100%;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            min-height: 100%;
            height: 100%;
            padding: 20px;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
        }

        /* 侧边栏 - Win11风格浅色 */
        .sidebar {
            background: var(--bg-sidebar);
            color: var(--text-primary);
            min-height: 100%;
            height: 100%;
            padding: 0;
            border-right: 1px solid var(--border-color);
            position: relative;
            min-width: 200px;
            max-width: 400px;
            transition: width 0.2s ease, min-width 0.2s ease;
        }

        .sidebar.collapsed {
            width: 0 !important;
            min-width: 0;
            padding: 0;
            border-right: none;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-header,
        .sidebar.collapsed .sidebar-content {
            visibility: hidden;
            opacity: 0;
        }

        /* 侧边栏拖拽调整宽度 */
        .sidebar-resize-handle {
            position: absolute;
            top: 0;
            right: -4px;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            z-index: 10;
        }

        .sidebar-resize-handle:hover,
        .sidebar-resize-handle.dragging {
            background: var(--primary-light);
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h5 { font-weight: 600; font-size: 16px; margin: 0; color: var(--text-primary); }

        .sidebar-toggle-pc {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .sidebar-toggle-pc:hover { background: #f0f0f0; }
        .sidebar-toggle-pc i { font-size: 14px; color: var(--text-secondary); }

        .sidebar .nav-link {
            color: var(--text-secondary);
            padding: 12px 16px;
            margin: 2px 8px;
            border-radius: 6px;
            transition: all 0.15s ease;
            font-weight: 400;
        }

        .sidebar .nav-link:hover { background: #f0f0f0; color: var(--text-primary); }
        .sidebar .nav-link.active { background: #e5f1fb; color: var(--primary); font-weight: 500; }
        .sidebar .nav-link i { margin-right: 10px; font-size: 16px; }

        /* 仓库卡片 */
        .warehouse-card {
            cursor: pointer;
            transition: all 0.15s ease;
            border-radius: 6px;
            position: relative;
            background: transparent;
            margin: 2px 6px;
            padding: 8px 10px 8px 13px;
            border-left: 3px solid transparent;
        }

        .warehouse-card:hover { background: #f5f5f5; }
        .warehouse-card.active { background: #e5f1fb; }

        .warehouse-card.all { border-left-color: #6c757d; background: #f8f9fa; font-weight: 600; }
        .warehouse-card.all.active { background: #e5f1fb; border-left-color: #0067c0; }

        .warehouse-card .warehouse-name {
            font-weight: 500;
            font-size: 13px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .warehouse-card .warehouse-name i {
            font-size: 12px;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            background: #e5f1fb;
            color: #0067c0;
        }

        .warehouse-card.all .warehouse-name i {
            background: #e9ecef;
            color: #495057;
        }

        .warehouse-card .warehouse-stats {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .warehouse-card .stat-item {
            font-size: 11px;
            color: var(--text-muted);
        }

        .warehouse-card .stat-item.in-stock { color: #107c10; }
        .warehouse-card .stat-item.checked-out { color: #b8860b; }

        .warehouse-actions {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.15s;
            display: flex;
            gap: 2px;
        }
        .warehouse-card:hover .warehouse-actions { opacity: 1; }
        .warehouse-actions .btn-sm {
            width: 22px;
            height: 22px;
            min-width: 22px;
            padding: 0 !important;
            margin: 0;
            line-height: 1 !important;
            border-radius: 4px;
        }
        .warehouse-actions .btn-sm i {
            display: inline-block;
            width: 100%;
            height: 100%;
            font-size: 12px;
            line-height: 22px;
            text-align: center;
            vertical-align: middle;
        }
        .warehouse-actions .btn-outline-light {
            background: #f0f0f0;
            border-color: #ccc;
            color: #555;
        }
        .warehouse-actions .btn-outline-light:hover {
            background: #e0e0e0;
            color: #333;
        }
        .warehouse-actions .btn-outline-danger {
            background: #ffeef0;
            border-color: #f5c6cb;
            color: #c82333;
        }
        .warehouse-actions .btn-outline-danger:hover {
            background: #dc3545;
            color: #fff;
        }
        .warehouse-actions .btn { padding: 2px 6px; font-size: 11px; }

        /* 标签徽章 - Win11风格 */
        .tag-badge {
            display: inline-block;
            background: #f0f0f0;
            color: var(--text-primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin: 2px;
            font-weight: 500;
            border: 1px solid #e0e0e0;
        }

        .tag-count {
            background: var(--primary);
            color: white;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 4px;
        }

        /* 标签区域 */
        .tag-section { border-top: 1px solid var(--border-color); margin-top: 16px; padding: 16px 0; }
        .tag-section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 12px; margin-bottom: 12px; }
        .tag-section-header h6 { color: var(--text-secondary); margin: 0; font-weight: 600; font-size: 13px; }

        .tag-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: transparent;
            border-radius: 4px;
            margin: 2px 8px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .tag-list-item:hover { background: #f5f5f5; cursor: pointer; }
        .tag-list-item.active { background: #e5f1fb; color: var(--primary); }
        .tag-list-item.active .count { background: var(--primary); color: white; }
        .tag-list-item .count { background: #e5e5e5; color: var(--text-secondary); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .tag-list-item .tag-actions { opacity: 0; transition: opacity 0.15s; }
        .tag-list-item:hover .tag-actions { opacity: 1; }

        /* 主内容区 */
        .main-content {
            flex: 1;
            min-width: 0;
            min-height: 100vh;
            height: 100vh;
            padding: 20px;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* 统计卡片 - Win11 Fluent风格 */
        .stat-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: all 0.15s;
        }

        .stat-card:hover { box-shadow: var(--shadow); }
        .stat-card h3 { font-size: 28px; font-weight: 600; margin: 0; color: var(--text-primary); }
        .stat-card p { margin: 4px 0 0; color: var(--text-muted); font-size: 12px; }
        .stat-card.success { border-left: 3px solid #107c10; background: linear-gradient(135deg, #f1faf1 0%, #ffffff 100%); }
        .stat-card.success h3 { color: #107c10; }
        .stat-card.warning { border-left: 3px solid #eaa300; background: linear-gradient(135deg, #fffdf5 0%, #ffffff 100%); }
        .stat-card.warning h3 { color: #b8860b; }
        .stat-card.info { border-left: 3px solid #0078d4; background: linear-gradient(135deg, #f0f7fd 0%, #ffffff 100%); }
        .stat-card.info h3 { color: #0078d4; }

        /* 标题栏 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .page-header h5 { margin: 0; font-weight: 600; color: var(--text-primary); font-size: 16px; }

        /* 搜索框 - Win11风格 */
        .search-box {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            transition: all 0.15s;
            background: var(--bg-card);
        }

        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); outline: none; }

        /* 按钮样式 - Win11风格 */
        .btn-primary { background: var(--primary); border-color: var(--primary); font-weight: 500; border-radius: 4px; }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
        .btn-outline-primary { color: var(--primary); border-color: var(--primary); border-radius: 4px; }
        .btn-outline-primary:hover { background: var(--primary); border-color: var(--primary); }
        .btn-outline-secondary { border-radius: 4px; }
        .btn-light { background: #f5f5f5; border-color: var(--border-color); border-radius: 4px; }
        .btn-light:hover { background: #e5e5e5; }

        /* 设备分区 */
        .device-section { margin-bottom: 20px; }

        .device-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.15s;
        }

        .device-section-header:hover { background: #fafafa; }
        .device-section-header h6 { margin: 0; display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--text-primary); font-size: 14px; }
        .device-section-header .badge { font-size: 11px; padding: 4px 10px; font-weight: 500; border-radius: 4px; }

        .device-section-body {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            max-height: none;
            overflow-y: visible;
        }

        #deviceList {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            min-height: 0;
        }

        .in-stock-section .device-section-header { border-top: 3px solid #107c10; }
        .in-stock-section .device-section-header .badge { background: #107c10; color: #ffffff; }
        .checked-out-section .device-section-header { border-top: 3px solid #eaa300; }
        .checked-out-section .device-section-header .badge { background: #eaa300; color: #ffffff; }

        /* 设备项 */
        .device-item {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 8px;
            transition: all 0.15s;
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--success-border);
            overflow: hidden;
            cursor: pointer;
        }

        .device-item:hover { background: #fafafa; border-color: #d0d0d0; }
        .device-item.checked-out { border-left-color: #eaa300; background: #fffef8; }

        .device-item {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 8px;
            transition: all 0.15s;
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--success-border);
            overflow: hidden;
            cursor: pointer;
        }

        .device-item:hover { background: #fafafa; border-color: #d0d0d0; }
        .device-item.checked-out { border-left-color: #eaa300; background: #fffef8; }
        .device-item strong { color: var(--text-primary); font-weight: 600; }

        /* 设备项内容布局 */
        .device-item .d-flex.justify-content-between {
            gap: 12px;
            min-width: 0;
        }

        .device-item .flex-grow-1 {
            min-width: 0;
            flex: 1;
            overflow: hidden;
        }

        .device-item .d-flex.gap-2 {
            flex-shrink: 0;
            gap: 6px !important;
        }

        /* 设备详情表格样式 */
        .device-details {
            display: flex;
            flex-wrap: nowrap;
            gap: 0;
            font-size: 12px;
            margin-top: 6px;
            overflow: hidden;
            min-width: 0;
        }
        .device-details .detail-item {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            padding-right: 10px;
            margin-right: 10px;
            border-right: 1px solid #eee;
            min-width: 0;
        }
        .device-details .detail-item:last-child {
            border-right: none;
            margin-right: 0;
            padding-right: 0;
            flex: 1;
            min-width: 120px;
            overflow: hidden;
        }
        .device-details .detail-label {
            color: var(--text-muted);
            margin-right: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .device-details .detail-value {
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .device-details .detail-item:hover .detail-value {
            white-space: normal;
            word-break: break-all;
        }
        /* 数量列 */
        .device-details .detail-item.quantity {
            width: 75px;
            flex-shrink: 0;
        }
        /* 位置列 */
        .device-details .detail-item.position {
            width: 120px;
            flex-shrink: 0;
        }
        /* 入库时间列 */
        .device-details .detail-item.checkin {
            width: 130px;
            flex-shrink: 0;
        }
        /* 备注列 */
        .device-details .detail-item.remark {
            flex: 1;
            min-width: 150px;
            max-width: 300px;
            overflow: hidden;
        }

        /* 备注值支持多行显示和换行 */
        .device-details .detail-item.remark .detail-value {
            white-space: normal !important;
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 状态徽章 - Win11风格 */
        .status-badge { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 500; }
        .status-normal { background: #d4edda; color: #155724; }
        .status-abnormal { background: #f8d7da; color: #721c24; }
        .status-maintenance { background: #fff3cd; color: #856404; }

        /* 操作按钮 */
        .checkout-btn, .checkin-btn { padding: 5px 10px; font-size: 12px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
        .checkout-btn { color: #8b6914; border-color: #eaa300; background: #fff8e6; }
        .checkout-btn:hover { background: #eaa300; color: white; border-color: #eaa300; }
        .checkin-btn { color: #0d5d0d; border-color: #107c10; background: #e6f5e6; }
        .checkin-btn:hover { background: #107c10; color: white; border-color: #107c10; }

        /* 设备项按钮组 */
        .device-item .btn-sm {
            padding: 4px 8px;
            font-size: 12px;
            min-width: auto;
            flex-shrink: 0;
        }

        .device-item .btn-outline-primary {
            padding: 4px 8px;
        }

        /* 设备操作按钮区域 */
        .device-item .device-actions {
            flex-shrink: 0;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* 去向标签 */
        .destination-tag {
            background: #fff3cd;
            color: #856404;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #ffc107;
        }

        /* Modal 样式 - Win11风格 */
        .modal-header { background: var(--bg-card); color: var(--text-primary); border-bottom: 1px solid var(--border-color); border-radius: 8px 8px 0 0; padding: 16px 20px; }
        .modal-header .btn-close { opacity: 0.5; }
        .modal-header .btn-close:hover { opacity: 1; }
        .modal-content { border-radius: 8px; border: 1px solid var(--border-color); box-shadow: var(--shadow-lg); }
        .modal-footer { border-top: 1px solid var(--border-color); background: var(--bg-card); border-radius: 0 0 8px 8px; padding: 12px 20px; }
        .modal-body { padding: 20px; }

        /* 设备详情样式 */
        .device-detail-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .detail-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px 20px;
            padding: 12px;
            background: var(--bg-light);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            align-items: start;
        }
        .detail-row.full-width {
            grid-template-columns: 1fr;
        }
        .detail-row.full-width .detail-label {
            grid-column: 1;
            margin-bottom: 4px;
        }
        .detail-row.full-width .detail-value {
            grid-column: 1;
        }
        .detail-label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .detail-value {
            color: var(--text-primary);
            font-size: 14px;
            word-break: break-word;
        }
        .detail-remark {
            background: white;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            min-height: 60px;
            white-space: pre-wrap;
        }

        /* 表单样式 - Win11风格 */
        .form-control, .form-select { border: 1px solid var(--border-color); border-radius: 4px; padding: 8px 12px; font-size: 13px; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
        .form-label { font-weight: 500; color: var(--text-secondary); font-size: 12px; margin-bottom: 4px; }

        /* 折叠箭头 */
        .chevron-icon { transition: transform 0.2s; }
        .chevron-icon.collapsed { transform: rotate(-90deg); }

        /* 滚动条美化 - Win11风格 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 40px 24px; color: var(--text-muted); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { margin: 0; font-size: 13px; }

        /* Alert样式 */
        .alert { border-radius: 4px; border: none; }
        .alert-warning { background: #fff3cd; color: #856404; }
        .alert-success { background: #d4edda; color: #155724; }

        /* 侧边栏收纳/展开控制 */
        .sidebar-toggle-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .sidebar-toggle-btn:hover { background: #f5f5f5; }
        .sidebar-toggle-btn i { font-size: 18px; color: var(--text-secondary); }

        /* PC端侧边栏收起后的展开按钮 */
        .sidebar-expand-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            margin-right: 12px;
        }
        .sidebar-expand-btn:hover { background: #f5f5f5; }
        .sidebar-expand-btn i { font-size: 18px; color: var(--text-secondary); }

        @media (min-width: 769px) {
            .sidebar.collapsed + .main-content .sidebar-expand-btn {
                display: flex;
            }
        }

        .sidebar-close-btn {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
            z-index: 10;
        }
        .sidebar-close-btn:hover { background: #f0f0f0; color: var(--text-primary); }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1040;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.show { display: block; opacity: 1; }

        /* ========== 移动端优化 (≤768px) ========== */
        @media (max-width: 768px) {
            body {
                padding: 0 !important;
                margin: 0 !important;
                overflow-x: hidden;
            }

            .container-fluid {
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
            }

            .main-card {
                min-height: 100vh;
                border-radius: 0 !important;
                border: none !important;
                margin: 0 !important;
                box-shadow: none !important;
            }

            .main-card > .row {
                margin: 0 !important;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: -280px;
                width: 280px;
                height: 100vh;
                z-index: 1050;
                transition: left 0.3s ease;
                min-height: auto;
                border-right: none;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.15);
                overflow-y: auto;
            }
            .sidebar.show { left: 0; }

            .sidebar-toggle-btn { display: flex; }
            .sidebar-close-btn { display: flex; align-items: center; justify-content: center; }

            .sidebar-header { position: relative; padding-right: 48px; }

            .main-content {
                padding: 12px;
                width: 100% !important;
                margin: 0 !important;
                min-height: 100vh;
            }

            .mobile-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 12px;
                padding-bottom: 12px;
                border-bottom: 1px solid var(--border-color);
            }
            .mobile-header .page-title {
                flex: 1;
                font-weight: 600;
                font-size: 14px;
                color: var(--text-primary);
                margin: 0;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .mobile-tools {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .mobile-sort-select {
                width: 70px;
                font-size: 12px;
                padding: 4px 8px;
            }
            .mobile-search-btn,
            .mobile-add-btn {
                padding: 6px 10px;
                font-size: 14px;
            }
            .mobile-search-container {
                display: flex;
                gap: 8px;
                margin-bottom: 12px;
                padding: 8px;
                background: var(--bg-light);
                border-radius: 6px;
            }
            .mobile-search-input {
                flex: 1;
                font-size: 14px;
            }

            /* 统计卡片横向紧凑排列 */
            .stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
            .stat-row .col-md-4 { flex: 1; padding: 0; }
            .stat-card {
                padding: 10px 12px;
                margin-bottom: 0;
                text-align: center;
            }
            .stat-card h3 { font-size: 18px; margin-bottom: 2px; }
            .stat-card p { font-size: 10px; margin: 0; }

            .page-header { display: none; }

            .device-section { margin-bottom: 12px; }
            .device-item {
                padding: 10px 12px;
                margin: 6px;
            }

            /* 移动端设备项布局优化 */
            .device-item .d-flex.justify-content-between {
                flex-direction: column;
                gap: 8px;
            }

            .device-item .d-flex.gap-2 {
                width: 100%;
                justify-content: flex-end;
                margin-top: 4px;
            }

            .device-item .btn-sm {
                flex: 1;
                min-width: 80px;
            }

            /* 移动端设备详情横向紧凑布局 */
            .device-item .device-details {
                display: flex;
                flex-wrap: wrap;
                gap: 6px 10px;
                margin-top: 6px;
            }

            .device-item .detail-item {
                display: inline-flex;
                align-items: center;
                font-size: 11px;
                margin: 0;
                padding: 2px 6px;
                background: #f5f5f5;
                border-radius: 3px;
            }

            .device-item .detail-label {
                color: var(--text-muted);
                margin-right: 4px;
                font-size: 10px;
            }

            .device-item .detail-value {
                color: var(--text-primary);
                font-weight: 500;
                max-width: 80px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* 移动端入库时间显示优化 */
            .device-item .detail-item.checkin {
                min-width: 95px;
            }

            .device-item .detail-item.checkin .detail-value {
                max-width: 95px;
            }

            /* 移动端数量显示优化 */
            .device-item .detail-item.quantity {
                min-width: 55px;
            }

            .device-item .detail-item.quantity .detail-value {
                max-width: 55px;
            }

            .device-item .detail-item.remark {
                width: 100%;
                background: transparent;
                padding: 2px 0;
            }

            .device-item .detail-item.remark .detail-value {
                max-width: 100%;
            }

            .device-item .detail-item.remark .detail-value.remark-clickable {
                cursor: pointer;
            }

            /* 移动端按钮文字简化 */
            .checkout-btn::after { content: " 出库"; }
            .checkin-btn::after { content: " 入库"; }
        }

        /* ========== 平板端优化 (769px - 1024px) ========== */
        @media (min-width: 769px) and (max-width: 1024px) {
            .main-content {
                padding: 16px;
            }

            .device-item {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 8px;
            transition: all 0.15s;
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--success-border);
            overflow: hidden;
            cursor: pointer;
        }

            .device-item {
                padding: 12px 14px;
                margin: 6px 8px;
            }

            .device-item .d-flex.justify-content-between {
                gap: 10px;
            }

            .device-item .flex-grow-1 {
                min-width: 0;
            }

            /* 平板端设备列表左右布局 */
            .device-header-row {
                display: flex;
                justify-content: flex-start;
                align-items: flex-start;
                gap: 16px;
            }

            .device-name-section {
                flex: 0 0 auto;
                min-width: 0;
                max-width: 35%;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .device-name-section .name-tags-row {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                gap: 4px;
                min-width: 0;
                max-width: 100%;
                overflow: hidden;
            }

            .device-name-section .name-tags-row strong {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 100%;
            }

            .device-name-section .status-tags-row {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                gap: 4px;
            }

            .device-name-section .status-badge,
            .device-name-section .tag-badge,
            .device-name-section .destination-tag {
                display: inline-block;
                font-size: 12px;
            }

            /* 平板端详情列宽度调整 */
            .device-details {
                flex-wrap: wrap;
                gap: 6px 10px;
                flex: 1;
                min-width: 0;
                align-items: flex-start;
                overflow: hidden;
            }

            .device-details .detail-item {
                flex: 0 0 auto;
                min-width: 0;
                white-space: nowrap;
            }

            .device-details .detail-item.quantity {
                min-width: 80px;
                width: auto;
            }

            .device-details .detail-item.position {
                min-width: 90px;
                width: auto;
            }

            .device-details .detail-item.checkin {
                min-width: 110px;
                width: auto;
            }

            .device-details .detail-item.remark {
                min-width: 100px;
                max-width: 100%;
                flex: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .device-details .detail-item .detail-label {
                display: inline-block;
                font-size: 10px;
                color: var(--text-secondary);
                margin-right: 4px;
            }

            .device-details .detail-item .detail-value {
                display: inline-block;
                font-size: 11px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: calc(100% - 30px);
                vertical-align: middle;
            }

            .device-details .detail-item.remark .detail-value {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .device-details .detail-item.remark .detail-value.remark-clickable {
                cursor: pointer;
            }

            /* 平板端按钮优化 */
            .device-item .device-actions {
                gap: 4px;
            }

            .device-item .btn-sm {
                padding: 4px 6px;
                font-size: 11px;
                min-width: auto;
            }

            .checkout-btn, .checkin-btn {
                padding: 4px 6px;
                font-size: 11px;
            }

            .device-item strong {
                font-size: 14px;
            }

            /* 平板端标签和状态徽章 */
            .tag-badge {
                font-size: 10px;
                padding: 2px 6px;
            }

            .status-badge {
                font-size: 10px;
                padding: 2px 6px;
            }

            /* 平板端统计卡片 */
            .stat-card {
                padding: 12px 16px;
            }

            .stat-card h3 {
                font-size: 22px;
            }
        }

        /* ========== 桌面端优化 (≥1025px) ========== */
        @media (min-width: 1025px) {
            .device-item {
                padding: 12px 16px;
                margin: 8px;
            }

            /* 桌面端详情列完整显示 */
            .device-details .detail-item.quantity {
                width: 70px;
            }

            .device-details .detail-item.position {
                width: 120px;
            }

            .device-details .detail-item.checkin {
                width: 150px;
            }

            .device-details .detail-item.remark {
                min-width: 200px;
                max-width: 400px;
            }

            .device-details .detail-item.remark .detail-value.remark-clickable {
                cursor: pointer;
            }

            /* 桌面端按钮完整显示 */
            .device-item .btn-sm {
                padding: 5px 10px;
                font-size: 12px;
            }

            .checkout-btn, .checkin-btn {
                padding: 5px 12px;
                font-size: 12px;
            }
        }

        @media (min-width: 769px) {
            .mobile-header { display: none; }
        }

        /* ========== 小屏手机优化 (≤480px) ========== */
        @media (max-width: 480px) {
            .device-item {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 8px;
            transition: all 0.15s;
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--success-border);
            overflow: hidden;
            cursor: pointer;
        }

            .device-item {
                padding: 8px 10px;
                margin: 4px;
            }

            .device-item strong {
                font-size: 13px;
            }

            .device-details {
                font-size: 11px;
            }

            .device-item .btn-sm {
                font-size: 11px;
                padding: 3px 6px;
                min-width: 70px;
            }

            .checkout-btn::after { content: ""; }
            .checkin-btn::after { content: ""; }

            .checkout-btn::before { content: "出库"; }
            .checkin-btn::before { content: "入库"; }

            /* 删除按钮和修改按钮显示文字 */
            .btn-outline-danger::before { content: "删除"; }
            .btn-outline-primary::before { content: "修改"; }

            /* 小屏上隐藏图标 */
            .btn-outline-danger i,
            .btn-outline-primary i { display: none; }

            /* 小屏手机详情更紧凑 */
            .device-item .device-details {
                gap: 6px 8px;
            }

            .device-item .detail-item {
                padding: 2px 4px;
                font-size: 10px;
            }

            .device-item .detail-value {
                max-width: 60px;
            }


            .device-item .detail-item.remark .detail-value.remark-clickable {
                cursor: pointer;
            }
        }

        /* 富文本编辑器占位符样式 */
        [contenteditable][data-placeholder]:empty:before {
            content: attr(data-placeholder);
            color: #6c757d;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="main-card">
            <div class="row g-0">
                <!-- 遮罩层 -->
                <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

                <!-- 侧边栏 -->
                <div class="col-md-3 sidebar" id="sidebar">
                    <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
                    <button class="sidebar-close-btn" onclick="toggleSidebar()" title="关闭">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    <div class="sidebar-header">
                        <h5><i class="bi bi-box-seam me-2"></i>仓库资产管理系统</h5>
                        <button class="sidebar-toggle-pc" onclick="toggleSidebarPC()" title="收起侧边栏">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                    </div>
                    <div class="sidebar-content">
                        <div class="p-3">
                            <button class="btn btn-light w-100 btn-sm" onclick="showWarehouseModal()">
                                <i class="bi bi-plus-circle"></i> 新建仓库
                            </button>
                        </div>
                        <div class="nav flex-column" id="warehouseList"></div>
                        <div class="tag-section">
                            <div class="tag-section-header">
                                <h6><i class="bi bi-tags"></i> 标签统计</h6>
                            </div>
                            <div id="tagStatsList"></div>
                        </div>
                    </div>
                </div>

                <!-- 主内容区 -->
                <div class="main-content">
                    <!-- 移动端顶部工具栏 -->
                    <div class="mobile-header">
                        <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="打开菜单">
                            <i class="bi bi-list"></i>
                        </button>
                        <h5 class="page-title" id="mobileWarehouseTitle">请选择仓库</h5>
                        <div class="mobile-tools">
                            <select class="form-select form-select-sm mobile-sort-select" id="mobileSortSelect" onchange="sortDevices()">
                                <option value="name">排序</option>
                                <option value="name">名称</option>
                                <option value="checkin">入库</option>
                                <option value="checkout">出库</option>
                            </select>
                            <button class="btn btn-light btn-sm mobile-search-btn" onclick="toggleMobileSearch()" title="搜索">
                                <i class="bi bi-search"></i>
                            </button>
                            <button class="btn btn-primary btn-sm mobile-add-btn" onclick="showDeviceModal()" title="添加设备">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 移动端搜索框（默认隐藏） -->
                    <div class="mobile-search-container" id="mobileSearchContainer" style="display: none;">
                        <input type="text" class="form-control mobile-search-input" id="mobileSearchInput" placeholder="搜索设备..." oninput="filterDevices()">
                        <button class="btn btn-light btn-sm" onclick="toggleMobileSearch()">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>

                    <!-- PC端收起后的展开按钮 -->
                    <div class="d-none d-md-flex align-items-center mb-3" id="pcToolbar">
                        <button class="sidebar-expand-btn" onclick="toggleSidebarPC()" title="展开侧边栏">
                            <i class="bi bi-list"></i>
                        </button>
                    </div>

                    <!-- 标题栏 -->
                    <div class="page-header">
                        <h5 id="currentWarehouseTitle"><i class="bi bi-folder"></i> 请选择仓库</h5>
                        <div class="d-flex gap-2">
                            <select class="form-select form-select-sm" id="sortSelect" onchange="sortDevices()" style="width: auto;">
                                <option value="name">按名称排序</option>
                                <option value="checkin">按入库时间排序</option>
                                <option value="checkout">按出库时间排序</option>
                            </select>
                            <input type="text" class="search-box" id="searchInput" placeholder="搜索设备..." oninput="filterDevices()">
                            <button class="btn btn-primary btn-sm" onclick="showDeviceModal()">
                                <i class="bi bi-plus-lg"></i> 添加设备
                            </button>
                        </div>
                    </div>

                    <!-- 设备列表 -->
                    <div id="deviceList">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <p>请先选择或创建一个仓库</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 仓库Modal -->
    <div class="modal fade" id="warehouseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="warehouseModalTitle">新建仓库</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="warehouseId">
                    <div class="mb-3">
                        <label class="form-label">仓库名称 *</label>
                        <input type="text" class="form-control" id="warehouseName" placeholder="例如：工作仓库">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="warehouseDesc" rows="2" placeholder="仓库描述（可选）"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="deleteWarehouseBtn" style="display:none;" onclick="deleteWarehouse()">删除</button>
                    <button type="button" class="btn btn-primary" onclick="saveWarehouse()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 设备Modal -->
    <div class="modal fade" id="deviceModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 550px;">
            <div class="modal-content" style="border: 1px solid #dee2e6; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <div class="modal-header" style="border-bottom: 1px solid #dee2e6; padding: 16px 20px; background-color: #f8f9fa;">
                    <h5 class="modal-title" id="deviceModalTitle" style="font-size: 16px; font-weight: 600; color: #212529; margin: 0;">
                        <i class="bi bi-gear me-2" style="color: #495057;"></i>添加设备
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="padding: 20px; max-height: 60vh; overflow-y: auto;">
                    <input type="hidden" id="deviceId">
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">所属仓库 *</label>
                        <select class="form-select" id="deviceWarehouse" style="font-size: 14px;"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">设备名称 *</label>
                        <input type="text" class="form-control" id="deviceName" placeholder="例如：Dell电脑主机" style="font-size: 14px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">标签名</label>
                        <input type="text" class="form-control" id="deviceTagName" placeholder="例如：电脑、显示器" style="font-size: 14px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">数量 *</label>
                        <input type="number" class="form-control" id="deviceQuantity" value="1" min="1" style="font-size: 14px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">存放位置</label>
                        <input type="text" class="form-control" id="deviceStorageLocation" placeholder="例如：A区货架2层" style="font-size: 14px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">入库时间</label>
                        <input type="date" class="form-control" id="deviceCheckinTime" style="font-size: 14px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">在库状态</label>
                        <select class="form-select" id="deviceLocationStatus" style="font-size: 14px;">
                            <option value="in_stock">在库</option>
                            <option value="checked_out">已出库</option>
                        </select>
                    </div>
                    <div class="mb-3" id="destinationField" style="display:none;">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">去向</label>
                        <input type="text" class="form-control" id="deviceDestination" placeholder="例如：同事张三借用" style="font-size: 14px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 13px; font-weight: 500; color: #6c757d;">状态</label>
                        <select class="form-select" id="deviceStatus" style="font-size: 14px;">
                            <option value="正常">正常</option>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ===== API 配置（自动切换）=====
        // 本地开发（Node.js + MySQL）：http://localhost:3000 → 走本地 /api
        // 云端部署（Workers + D1）：https://xxx.pages.dev → 走 Worker API
        const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
            ? '/api'
            : 'https://dms-worker.171519019.workers.dev/api';
        // ===================
        
        let currentWarehouseId = null;
        let currentWarehouseName = null;
        let allDevices = [];
        let warehouses = [];
        let tagStats = [];
        let currentTagFilter = null;

        // 格式化时间
        function formatTime(timeStr) {
            if (!timeStr) return '';
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        // 格式化日期（设备列表用）
        function formatDate(timeStr) {
            if (!timeStr) return '';
            const date = new Date(timeStr);
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
        }

        // 格式化日期为 MySQL datetime 格式
        function formatDateTime(date) {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        }

        // 显示备注预览
        function showRemarkPreview(deviceName, remark) {
            if (!remark) return;
            document.getElementById('remarkDeviceName').textContent = deviceName;
            document.getElementById('remarkContent').innerHTML = decodeRichText(remark);
            new bootstrap.Modal(document.getElementById('remarkPreviewModal')).show();
        }

        // 排序设备
        function sortDevices() {
            const sortType = document.getElementById('sortSelect').value;
            let sorted = [...allDevices];
            switch (sortType) {
                case 'name': sorted.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN')); break;
                case 'checkin': sorted.sort((a, b) => !a.checkin_time ? 1 : !b.checkin_time ? -1 : new Date(b.checkin_time) - new Date(a.checkin_time)); break;
                case 'checkout': sorted.sort((a, b) => !a.checkout_time ? 1 : !b.checkout_time ? -1 : new Date(b.checkout_time) - new Date(a.checkout_time)); break;
            }
            renderDevices(sorted);
        }

        // 加载仓库列表
        async function loadWarehouses() {
            try {
                const res = await fetch(`${API_BASE}/warehouses`);
                const data = await res.json();
                warehouses = Array.isArray(data) ? data : [];
                // 在顶部添加"总仓库"选项
                warehouses.unshift({ id: 0, name: '总仓库' });
                renderWarehouseList();
                updateWarehouseSelect();
            } catch (e) { console.error('加载仓库失败:', e); }
        }

        // 加载标签统计（支持按仓库筛选）
        async function loadTagStats(warehouseName = null) {
            try {
                const url = warehouseName ? `${API_BASE}/tag-stats?warehouseName=${encodeURIComponent(warehouseName)}` : `${API_BASE}/tag-stats`;
                const res = await fetch(url);
                const data = await res.json();
                tagStats = Array.isArray(data) ? data : [];
                renderTagStats();
            } catch (e) {
                console.error('加载标签统计失败:', e);
                tagStats = [];
                renderTagStats();
            }
        }

        // 更新仓库下拉框
        function updateWarehouseSelect() {
            const select = document.getElementById('deviceWarehouse');
            select.innerHTML = warehouses.map(w => `<option value="${w.name}">${w.name}</option>`).join('');
            if (currentWarehouseName) select.value = currentWarehouseName;
        }

        // 渲染仓库列表
        function renderWarehouseList() {
            const list = document.getElementById('warehouseList');
            list.innerHTML = warehouses.map(w => {
                const inStock = w.inStockCount || 0;
                const checkedOut = w.checkedOutCount || 0;
                const isAll = w.id === 0;
                const icon = isAll ? 'bi-grid' : 'bi-box';
                const actionsHtml = isAll ? '' : `
                    <div class="warehouse-actions" onclick="event.stopPropagation()">
                        <button class="btn btn-sm btn-outline-light" onclick="editWarehouse(${w.id})" title="编辑"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteWarehouseConfirm(${w.id})" title="删除"><i class="bi bi-trash"></i></button>
                    </div>
                `;
                return `
                    <div class="nav-link warehouse-card${isAll ? ' all' : ''}" data-id="${w.id}" data-name="${w.name}" onclick="selectWarehouse(${w.id}, '${w.name}')">
                        ${actionsHtml}
                        <div class="warehouse-name">
                            <i class="bi ${icon}"></i> ${w.name}
                        </div>
                        <div class="warehouse-stats">
                            <span class="stat-item in-stock">在库 ${inStock}</span>
                            <span class="stat-item checked-out">出库 ${checkedOut}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染标签统计
        function renderTagStats() {
            const list = document.getElementById('tagStatsList');
            if (tagStats.length === 0) { list.innerHTML = '<div class="text-muted small">暂无标签数据</div>'; return; }
            list.innerHTML = tagStats.map(tag => `
                <div class="tag-list-item ${currentTagFilter === tag.name ? 'active' : ''}" onclick="filterByTag('${tag.name}')" style="cursor:pointer;">
                    <span><i class="bi bi-tag"></i> ${tag.name} <span class="count">${tag.total_count}</span></span>
                </div>
            `).join('');
        }

        // 按标签筛选
        function filterByTag(tagName) {
            if (currentTagFilter === tagName) {
                // 再次点击取消筛选
                currentTagFilter = null;
            } else {
                currentTagFilter = tagName;
            }
            renderTagStats();
            loadDevices();
        }

        // 选择仓库
        async function selectWarehouse(id, name) {
            currentWarehouseId = id;
            currentWarehouseName = name === '总仓库' ? null : name;
            currentTagFilter = null; // 切换仓库时清除标签筛选
            document.querySelectorAll('.warehouse-card').forEach(card => { card.classList.toggle('active', card.dataset.id == id); });
            document.getElementById('currentWarehouseTitle').innerHTML = `<i class="bi bi-folder"></i> ${name}`;
            document.getElementById('mobileWarehouseTitle').textContent = name;
            document.getElementById('deviceWarehouse').value = name;
            await loadDevices();
            // 加载标签统计（总仓库时传 null，其他传仓库名）
            await loadTagStats(currentWarehouseName);
            // 移动端选择仓库后自动收起侧边栏
            if (window.innerWidth <= 768) toggleSidebar();
        }

        // 加载设备
        async function loadDevices() {
            if (!currentWarehouseId && currentWarehouseId !== 0) return;
            try {
                let url = `${API_BASE}/devices`;
                // 总仓库(id=0)加载所有设备，其他按仓库筛选
                if (currentWarehouseId > 0) {
                    url += `?warehouseId=${currentWarehouseId}`;
                }
                const res = await fetch(url);
                const data = await res.json();
                let devices = Array.isArray(data) ? data : [];

                // 应用标签筛选
                if (currentTagFilter) {
                    devices = devices.filter(d => d.tag_name === currentTagFilter);
                }

                allDevices = devices;
                renderDevices(devices);
                await updateStats();
            } catch (e) {
                console.error('加载设备失败:', e);
                allDevices = [];
                renderDevices([]);
            }
        }

        // 渲染设备列表
        function renderDevices(devices) {
            const list = document.getElementById('deviceList');
            if (devices.length === 0) {
                list.innerHTML = `<div class="text-center text-muted py-5"><i class="bi bi-inbox" style="font-size: 48px;"></i><p class="mt-2">该仓库暂无设备，点击上方"添加设备"按钮</p></div>`;
                return;
            }

            const inStockDevices = devices.filter(d => d.location_status === 'in_stock' || !d.location_status);
            const checkedOutDevices = devices.filter(d => d.location_status === 'checked_out');
            const statusClass = { '正常': 'status-normal', '异常': 'status-abnormal', '维修中': 'status-maintenance' };

            const renderDeviceItem = (device, isOut) => {

                                        <span class="detail-item checkin"><span class="detail-label">入库时间:</span><span class="detail-value" title="${checkinTimeValue}">${checkinTimeValue}</span></span>
                                        <span class="detail-item remark"><span class="detail-label">备注:</span><span class="detail-value remark-clickable" onclick="event.stopPropagation(); showRemarkPreview('${device.name}', '${(device.remark || '').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/`/g, '\\`')}')" title="${device.remark || ''}">${decodeRichText(device.remark || '')}</span></span>

            const checkedOutHtml = checkedOutDevices.length > 0 ? checkedOutDevices.map(d => renderDeviceItem(d, true)).join('') : '<div class="text-center text-muted py-3">暂无已出库设备</div>';

            list.innerHTML = `

        // 更新统计（仓库在库/出库数量）
        async function updateStats() {
            try {
                const res = await fetch(`${API_BASE}/devices`);
                const data = await res.json();

                warehouses = warehouses.map(w => {

                        w.inStockCount = allData.filter(d => d.location_status === 'in_stock' || !d.location_status).length;
                        w.checkedOutCount = allData.filter(d => d.location_status === 'checked_out').length;
                    } else {
                        const wd = allData.filter(d => d.warehouse_name === w.name);
                        w.inStockCount = wd.filter(d => d.location_status === 'in_stock' || !d.location_status).length;
                        w.checkedOutCount = wd.filter(d => d.location_status === 'checked_out').length;

                    return w;

            // 如果焦点在备注编辑器中
            if (event.target.id === 'deviceRemarkEditor') {
                // 处理占位符
                if (event.target.textContent.trim() === '') {
                    event.target.innerHTML = '';
                }
                // Ctrl+Enter 保存
                if (event.ctrlKey && event.key === 'Enter') {
                    event.preventDefault();
                    saveDevice();
                }
                // 普通回车键允许换行（不阻止默认行为）
                return;
            }

            // 在其他输入框中，回车键保存
            if (event.key === 'Enter') {
                event.preventDefault();
                saveDevice();
            }
        }

        // 将富文本HTML转换为可存储的文本格式
        function encodeRichText(html) {
            if (!html) return '';

            // 创建临时元素来处理 HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;

            // 递归处理节点，将格式转换为 BBCode 标记
            function processNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.textContent;
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    const tagName = node.tagName.toLowerCase();
                    let content = '';

                    // 递归处理子节点
                    for (let child of node.childNodes) {
                        content += processNode(child);
                    }

                    // 根据标签类型添加格式标记
                    switch (tagName) {
                        case 'b':
                        case 'strong':
                            return `[B]${content}[/B]`;
                        case 'i':
                        case 'em':
                            return `[I]${content}[/I]`;
                        case 'u':
                            return `[U]${content}[/U]`;
                        case 's':
                        case 'strike':
                        case 'del':
                            return `[S]${content}[/S]`;
                        case 'font':
                            let color = node.getAttribute('color');
                            let size = node.getAttribute('size');
                            if (color) {
                                return `[COLOR=${color}]${content}[/COLOR]`;
                            } else if (size) {
                                return `[SIZE=${size}]${content}[/SIZE]`;
                            }
                            return content;
                        case 'br':
                            return '\n';
                        case 'div':
                        case 'p':
                            return content + '\n';
                        case 'img':
                            // 保留图片标签
                            return node.outerHTML;
                        default:
                            return content;
                    }
                }
                return '';
            }

            let text = '';
            for (let child of tempDiv.childNodes) {
                text += processNode(child);
            }

            // 处理 HTML 实体
            text = text.replace(/&nbsp;/g, ' ');
            text = text.replace(/&lt;/g, '<');
            text = text.replace(/&gt;/g, '>');
            text = text.replace(/&amp;/g, '&');

            // 清理多余的空行
            text = text.replace(/\n{3,}/g, '\n\n');

            return text.trim();
        }

        // 将存储的富文本标记转换回 HTML
        function decodeRichText(text) {
            if (!text) return '';

            // 先将换行转换为 <br>
            let html = text.replace(/\n/g, '<br>');

            // 解析富文本标记
            html = html.replace(/\[B\]([\s\S]*?)\[\/B\]/gi, '<b>$1</b>');
            html = html.replace(/\[I\]([\s\S]*?)\[\/I\]/gi, '<i>$1</i>');
            html = html.replace(/\[U\]([\s\S]*?)\[\/U\]/gi, '<u>$1</u>');
            html = html.replace(/\[S\]([\s\S]*?)\[\/S\]/gi, '<s>$1</s>');
            html = html.replace(/\[COLOR=([^\]]+)\]([\s\S]*?)\[\/COLOR\]/gi, '<font color="$1">$2</font>');
            html = html.replace(/\[SIZE=([^\]]+)\]([\s\S]*?)\[\/SIZE\]/gi, '<font size="$1">$2</font>');

            // 确保连续的换行被正确处理
            html = html.replace(/(<br>\s*){2,}/g, '<br><br>');

            return html;
        }

            remarkEditor.innerHTML = richTextEditor.innerHTML;

            // 同步更新隐藏的 textarea（用于保存到数据库）
            if (textarea) {
                textarea.value = encodeRichText(richTextEditor.innerHTML);
            }

            // 关闭模态框 - 使用多种方法确保关闭
            try {
                const modal = bootstrap.Modal.getInstance(document.getElementById('richTextEditorModal'));
                if (modal) {
                    modal.hide();
                } else {
                    // 如果无法获取实例，尝试直接关闭
                    const modalEl = document.getElementById('richTextEditorModal');
                    if (modalEl) {
                        modalEl.classList.remove('show');
                        modalEl.style.display = 'none';
                        // 移除 backdrop
                        const backdrop = document.querySelector('.modal-backdrop');
                        if (backdrop) backdrop.remove();
                        document.body.classList.remove('modal-open');
                        document.body.style.overflow = '';
                        document.body.style.paddingRight = '';
                    }
                }
            } catch (e) {
                console.error('关闭模态框失败:', e);
                // 备用方法：直接关闭
                const modalEl = document.getElementById('richTextEditorModal');
                if (modalEl) {
                    modalEl.classList.remove('show');
                    modalEl.style.display = 'none';
                }
            }
        }

        // ============ 标签操作 ============
        function showTagModal(id = null) {
            const modal = new bootstrap.Modal(document.getElementById('tagModal'));
            document.getElementById('tagModalTitle').textContent = id ? '编辑标签' : '添加标签';
            document.getElementById('deleteTagBtn').style.display = id ? 'block' : 'none';
            if (id) {
                const tag = tagStats.find(t => t.id === id);
                document.getElementById('tagId').value = tag.id;
                document.getElementById('tagName').value = tag.name;
            } else {
                document.getElementById('tagId').value = '';
                document.getElementById('tagName').value = '';
            }
            modal.show();
        }

        function editTag(id, name) { showTagModal(id); }

        function deleteTagConfirm(id) {
            if (!confirm('确定要删除该标签吗？')) return;
            document.getElementById('tagId').value = id;
            deleteTag();
        }

        async function saveTag() {
            const id = document.getElementById('tagId').value;
            const data = { name: document.getElementById('tagName').value };
            if (!data.name) { alert('请输入标签名称'); return; }
            try {
                if (id) await fetch(`${API_BASE}/tags/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                else await fetch(`${API_BASE}/tags`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
                await loadTagStats();
            } catch (e) { alert('保存失败: ' + e.message); }
        }

        async function deleteTag() {
            const id = document.getElementById('tagId').value;
            try {
                await fetch(`${API_BASE}/tags/${id}`, { method: 'DELETE' });
                bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
                await loadTagStats(); await loadWarehouses(); await loadDevices();
            } catch (e) { alert('删除失败: ' + e.message); }
        }

        // 侧边栏收纳/展开控制（移动端）
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        // 移动端搜索框显示/隐藏
        function toggleMobileSearch() {
            const searchContainer = document.getElementById('mobileSearchContainer');
            const searchInput = document.getElementById('mobileSearchInput');
            if (searchContainer.style.display === 'none') {
                searchContainer.style.display = 'flex';
                searchInput.focus();
            } else {
                searchContainer.style.display = 'none';
                searchInput.value = '';
                filterDevices();
            }
        }

        // 侧边栏收纳/展开控制（PC端）
        function toggleSidebarPC() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // 侧边栏拖拽调整宽度
        function initSidebarResize() {
            const handle = document.getElementById('sidebarResizeHandle');
            const sidebar = document.getElementById('sidebar');
            let isResizing = false;
            let startX = 0;
            let startWidth = 0;

            handle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = sidebar.offsetWidth;
                handle.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const diff = e.clientX - startX;
                const newWidth = Math.max(200, Math.min(400, startWidth + diff));
                sidebar.style.width = newWidth + 'px';
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    handle.classList.remove('dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        // 页面初始化
        // 回车快捷保存（支持Shift/Alt+Enter换行）
        document.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter') return;
            // Shift+Enter 或 Alt+Enter 允许换行，不触发保存
            if (e.shiftKey || e.altKey) return;
            // 在textarea中普通Enter允许换行
            if (e.target.tagName === 'TEXTAREA') return;

            const checkoutModal = document.getElementById('checkoutModal');
            const checkinModal = document.getElementById('checkinModal');
            const deviceModal = document.getElementById('deviceModal');

            if (checkoutModal && checkoutModal.classList.contains('show')) {
                e.preventDefault();
                confirmCheckout();
            } else if (checkinModal && checkinModal.classList.contains('show')) {
                e.preventDefault();
                confirmCheckin();
            } else if (deviceModal && deviceModal.classList.contains('show')) {
                e.preventDefault();
                saveDevice();
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            initSidebarResize();
            await loadWarehouses();
            if (warehouses.length > 0) {
                await selectWarehouse(warehouses[0].id, warehouses[0].name);
            }
            await loadTagStats();
            await updateStats();

            // 检查URL参数，如果有edit参数，自动打开编辑模态框
            const urlParams = new URLSearchParams(window.location.search);
            const editDeviceId = urlParams.get('edit');
            if (editDeviceId) {
                setTimeout(() => {
                    editDevice(parseInt(editDeviceId));
                }, 500);
            }
        });
    </script>
</body>
</html>
