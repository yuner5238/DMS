<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库资产管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Windows 11 风格配色 */
        :root {
            --primary: #0067c0;
            --primary-hover: #005a9e;
            --primary-light: #60cdff;
            --secondary: #5c5c5c;
            --success: #0f7b0f;
            --success-bg: #dff6dd;
            --success-border: #4caf50;
            --warning: #9d5b00;
            --warning-bg: #fff4ce;
            --warning-border: #ffb900;
            --danger: #c42b1c;
            --danger-bg: #fde7e9;
            --info: #0078d4;
            --info-bg: #e5f1fb;
            --bg-main: #f3f3f3;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #424242;
            --text-muted: #757575;
            --border-color: #e5e5e5;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        * { font-family: 'Segoe UI', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg-main); min-height: 100vh; padding: 16px; }

        .main-card {
            background: var(--bg-card);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .main-card > .row {
            display: flex;
            flex-wrap: nowrap;
        }

        .main-content {
            flex: 1;
            min-width: 0;
        }

        /* 侧边栏 - Win11风格浅色 */
        .sidebar {
            background: var(--bg-sidebar);
            color: var(--text-primary);
            min-height: 600px;
            padding: 0;
            border-right: 1px solid var(--border-color);
            position: relative;
            min-width: 200px;
            max-width: 400px;
            transition: width 0.2s ease, min-width 0.2s ease;
        }

        .sidebar.collapsed {
            width: 0 !important;
            min-width: 0;
            padding: 0;
            border-right: none;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-header,
        .sidebar.collapsed .sidebar-content {
            visibility: hidden;
            opacity: 0;
        }

        /* 侧边栏拖拽调整宽度 */
        .sidebar-resize-handle {
            position: absolute;
            top: 0;
            right: -4px;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            z-index: 10;
        }

        .sidebar-resize-handle:hover,
        .sidebar-resize-handle.dragging {
            background: var(--primary-light);
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h5 { font-weight: 600; font-size: 16px; margin: 0; color: var(--text-primary); }

        .sidebar-toggle-pc {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .sidebar-toggle-pc:hover { background: #f0f0f0; }
        .sidebar-toggle-pc i { font-size: 14px; color: var(--text-secondary); }

        .sidebar .nav-link {
            color: var(--text-secondary);
            padding: 12px 16px;
            margin: 2px 8px;
            border-radius: 6px;
            transition: all 0.15s ease;
            font-weight: 400;
        }

        .sidebar .nav-link:hover { background: #f0f0f0; color: var(--text-primary); }
        .sidebar .nav-link.active { background: #e5f1fb; color: var(--primary); font-weight: 500; }
        .sidebar .nav-link i { margin-right: 10px; font-size: 16px; }

        /* 仓库卡片 */
        .warehouse-card {
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            border-radius: 6px;
            position: relative;
            background: transparent;
            margin: 4px 8px;
        }

        .warehouse-card:hover { background: #f5f5f5; }
        .warehouse-card.active { background: #e5f1fb; border-color: var(--primary-light); }
        .warehouse-card.work { border-left: 3px solid #107c10; }
        .warehouse-card.home { border-left: 3px solid #eaa300; }
        .warehouse-card.other { border-left: 3px solid #0078d4; }

        .warehouse-actions { position: absolute; right: 8px; top: 8px; opacity: 0; transition: opacity 0.15s; }
        .warehouse-card:hover .warehouse-actions { opacity: 1; }
        .warehouse-actions .btn { padding: 4px 8px; font-size: 11px; }

        /* 标签徽章 - Win11风格 */
        .tag-badge {
            display: inline-block;
            background: #f0f0f0;
            color: var(--text-primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin: 2px;
            font-weight: 500;
            border: 1px solid #e0e0e0;
        }

        .tag-count {
            background: var(--primary);
            color: white;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 4px;
        }

        /* 标签区域 */
        .tag-section { border-top: 1px solid var(--border-color); margin-top: 16px; padding: 16px 0; }
        .tag-section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 12px; margin-bottom: 12px; }
        .tag-section-header h6 { color: var(--text-secondary); margin: 0; font-weight: 600; font-size: 13px; }

        .tag-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: transparent;
            border-radius: 4px;
            margin: 2px 8px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .tag-list-item:hover { background: #f5f5f5; }
        .tag-list-item .count { background: #e5e5e5; color: var(--text-secondary); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .tag-list-item .tag-actions { opacity: 0; transition: opacity 0.15s; }
        .tag-list-item:hover .tag-actions { opacity: 1; }

        /* 主内容区 */
        .main-content { padding: 20px; background: var(--bg-main); }

        /* 统计卡片 - Win11 Fluent风格 */
        .stat-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: all 0.15s;
        }

        .stat-card:hover { box-shadow: var(--shadow); }
        .stat-card h3 { font-size: 28px; font-weight: 600; margin: 0; color: var(--text-primary); }
        .stat-card p { margin: 4px 0 0; color: var(--text-muted); font-size: 12px; }
        .stat-card.success { border-left: 3px solid #107c10; background: linear-gradient(135deg, #f1faf1 0%, #ffffff 100%); }
        .stat-card.success h3 { color: #107c10; }
        .stat-card.warning { border-left: 3px solid #eaa300; background: linear-gradient(135deg, #fffdf5 0%, #ffffff 100%); }
        .stat-card.warning h3 { color: #b8860b; }
        .stat-card.info { border-left: 3px solid #0078d4; background: linear-gradient(135deg, #f0f7fd 0%, #ffffff 100%); }
        .stat-card.info h3 { color: #0078d4; }

        /* 标题栏 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .page-header h5 { margin: 0; font-weight: 600; color: var(--text-primary); font-size: 16px; }

        /* 搜索框 - Win11风格 */
        .search-box {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            transition: all 0.15s;
            background: var(--bg-card);
        }

        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); outline: none; }

        /* 按钮样式 - Win11风格 */
        .btn-primary { background: var(--primary); border-color: var(--primary); font-weight: 500; border-radius: 4px; }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
        .btn-outline-primary { color: var(--primary); border-color: var(--primary); border-radius: 4px; }
        .btn-outline-primary:hover { background: var(--primary); border-color: var(--primary); }
        .btn-outline-secondary { border-radius: 4px; }
        .btn-light { background: #f5f5f5; border-color: var(--border-color); border-radius: 4px; }
        .btn-light:hover { background: #e5e5e5; }

        /* 设备分区 */
        .device-section { margin-bottom: 20px; }

        .device-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.15s;
        }

        .device-section-header:hover { background: #fafafa; }
        .device-section-header h6 { margin: 0; display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--text-primary); font-size: 14px; }
        .device-section-header .badge { font-size: 11px; padding: 4px 10px; font-weight: 500; border-radius: 4px; }

        .device-section-body {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            max-height: 450px;
            overflow-y: auto;
        }

        .in-stock-section .device-section-header { border-top: 3px solid #107c10; }
        .in-stock-section .device-section-header .badge { background: #107c10; color: #ffffff; }
        .checked-out-section .device-section-header { border-top: 3px solid #eaa300; }
        .checked-out-section .device-section-header .badge { background: #eaa300; color: #ffffff; }

        /* 设备项 */
        .device-item {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 8px;
            transition: all 0.15s;
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--success-border);
        }

        .device-item:hover { background: #fafafa; border-color: #d0d0d0; }
        .device-item.checked-out { border-left-color: #eaa300; background: #fffef8; }
        .device-item strong { color: var(--text-primary); font-weight: 600; }

        /* 状态徽章 - Win11风格 */
        .status-badge { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 500; }
        .status-normal { background: #d4edda; color: #155724; }
        .status-abnormal { background: #f8d7da; color: #721c24; }
        .status-maintenance { background: #fff3cd; color: #856404; }

        /* 操作按钮 */
        .checkout-btn, .checkin-btn { padding: 5px 12px; font-size: 12px; border-radius: 4px; font-weight: 500; }
        .checkout-btn { color: #8b6914; border-color: #eaa300; background: #fff8e6; }
        .checkout-btn:hover { background: #eaa300; color: white; border-color: #eaa300; }
        .checkin-btn { color: #0d5d0d; border-color: #107c10; background: #e6f5e6; }
        .checkin-btn:hover { background: #107c10; color: white; border-color: #107c10; }

        /* 去向标签 */
        .destination-tag {
            background: #fff3cd;
            color: #856404;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #ffc107;
        }

        /* Modal 样式 - Win11风格 */
        .modal-header { background: var(--bg-card); color: var(--text-primary); border-bottom: 1px solid var(--border-color); border-radius: 8px 8px 0 0; padding: 16px 20px; }
        .modal-header .btn-close { opacity: 0.5; }
        .modal-header .btn-close:hover { opacity: 1; }
        .modal-content { border-radius: 8px; border: 1px solid var(--border-color); box-shadow: var(--shadow-lg); }
        .modal-footer { border-top: 1px solid var(--border-color); background: var(--bg-card); border-radius: 0 0 8px 8px; padding: 12px 20px; }
        .modal-body { padding: 20px; }

        /* 表单样式 - Win11风格 */
        .form-control, .form-select { border: 1px solid var(--border-color); border-radius: 4px; padding: 8px 12px; font-size: 13px; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
        .form-label { font-weight: 500; color: var(--text-secondary); font-size: 12px; margin-bottom: 4px; }

        /* 折叠箭头 */
        .chevron-icon { transition: transform 0.2s; }
        .chevron-icon.collapsed { transform: rotate(-90deg); }

        /* 滚动条美化 - Win11风格 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 40px 24px; color: var(--text-muted); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { margin: 0; font-size: 13px; }

        /* Alert样式 */
        .alert { border-radius: 4px; border: none; }
        .alert-warning { background: #fff3cd; color: #856404; }
        .alert-success { background: #d4edda; color: #155724; }

        /* 侧边栏收纳/展开控制 */
        .sidebar-toggle-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .sidebar-toggle-btn:hover { background: #f5f5f5; }
        .sidebar-toggle-btn i { font-size: 18px; color: var(--text-secondary); }

        /* PC端侧边栏收起后的展开按钮 */
        .sidebar-expand-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            margin-right: 12px;
        }
        .sidebar-expand-btn:hover { background: #f5f5f5; }
        .sidebar-expand-btn i { font-size: 18px; color: var(--text-secondary); }

        @media (min-width: 769px) {
            .sidebar.collapsed + .main-content .sidebar-expand-btn {
                display: flex;
            }
        }

        .sidebar-close-btn {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
            z-index: 10;
        }
        .sidebar-close-btn:hover { background: #f0f0f0; color: var(--text-primary); }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1040;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.show { display: block; opacity: 1; }

        @media (max-width: 768px) {
            body { padding: 8px; }

            .sidebar {
                position: fixed;
                top: 0;
                left: -280px;
                width: 280px;
                height: 100vh;
                z-index: 1050;
                transition: left 0.3s ease;
                min-height: auto;
                border-right: none;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.15);
                overflow-y: auto;
            }
            .sidebar.show { left: 0; }

            .sidebar-toggle-btn { display: flex; }
            .sidebar-close-btn { display: flex; align-items: center; justify-content: center; }

            .sidebar-header { position: relative; padding-right: 48px; }

            .main-content { padding: 12px; width: 100%; }

            .mobile-header {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 12px;
                padding-bottom: 12px;
                border-bottom: 1px solid var(--border-color);
            }
            .mobile-header .page-title {
                flex: 1;
                font-weight: 600;
                font-size: 15px;
                color: var(--text-primary);
                margin: 0;
            }

            /* 统计卡片横向紧凑排列 */
            .stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
            .stat-row .col-md-4 { flex: 1; padding: 0; }
            .stat-card {
                padding: 10px 12px;
                margin-bottom: 0;
                text-align: center;
            }
            .stat-card h3 { font-size: 18px; margin-bottom: 2px; }
            .stat-card p { font-size: 10px; margin: 0; }

            .page-header { display: none; }

            .device-section { margin-bottom: 12px; }
            .device-item { padding: 10px 12px; margin: 6px; }
        }

        @media (min-width: 769px) {
            .mobile-header { display: none; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="main-card">
            <div class="row g-0">
                <!-- 遮罩层 -->
                <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

                <!-- 侧边栏 -->
                <div class="col-md-3 sidebar" id="sidebar">
                    <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
                    <button class="sidebar-close-btn" onclick="toggleSidebar()" title="关闭">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    <div class="sidebar-header">
                        <h5><i class="bi bi-box-seam me-2"></i>仓库资产管理系统</h5>
                        <button class="sidebar-toggle-pc" onclick="toggleSidebarPC()" title="收起侧边栏">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                    </div>
                    <div class="sidebar-content">
                        <div class="p-3">
                            <button class="btn btn-light w-100 btn-sm" onclick="showWarehouseModal()">
                                <i class="bi bi-plus-circle"></i> 新建仓库
                            </button>
                        </div>
                        <div class="nav flex-column" id="warehouseList"></div>
                        <div class="tag-section">
                            <div class="tag-section-header">
                                <h6><i class="bi bi-tags"></i> 标签管理</h6>
                                <button class="btn btn-sm btn-outline-light" onclick="showTagModal()" title="添加标签">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                            <div id="tagStatsList"></div>
                        </div>
                    </div>
                </div>

                <!-- 主内容区 -->
                <div class="main-content">
                    <!-- 移动端顶部工具栏 -->
                    <div class="mobile-header">
                        <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="打开菜单">
                            <i class="bi bi-list"></i>
                        </button>
                        <h5 class="page-title" id="mobileWarehouseTitle">请选择仓库</h5>
                    </div>

                    <!-- PC端收起后的展开按钮 -->
                    <div class="d-none d-md-flex align-items-center mb-3" id="pcToolbar">
                        <button class="sidebar-expand-btn" onclick="toggleSidebarPC()" title="展开侧边栏">
                            <i class="bi bi-list"></i>
                        </button>
                    </div>

                    <!-- 标题栏 -->
                    <div class="page-header">
                        <h5 id="currentWarehouseTitle"><i class="bi bi-folder"></i> 请选择仓库</h5>
                        <div class="d-flex gap-2">
                            <select class="form-select form-select-sm" id="sortSelect" onchange="sortDevices()" style="width: auto;">
                                <option value="name">按名称排序</option>
                                <option value="checkin">按入库时间排序</option>
                                <option value="checkout">按出库时间排序</option>
                            </select>
                            <input type="text" class="search-box" id="searchInput" placeholder="搜索设备..." oninput="filterDevices()">
                            <button class="btn btn-primary btn-sm" onclick="showDeviceModal()">
                                <i class="bi bi-plus-lg"></i> 添加设备
                            </button>
                        </div>
                    </div>

                    <!-- 设备列表 -->
                    <div id="deviceList">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <p>请先选择或创建一个仓库</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 仓库Modal -->
    <div class="modal fade" id="warehouseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="warehouseModalTitle">新建仓库</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="warehouseId">
                    <div class="mb-3">
                        <label class="form-label">仓库名称 *</label>
                        <input type="text" class="form-control" id="warehouseName" placeholder="例如：工作仓库">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">仓库类型</label>
                        <select class="form-select" id="warehouseType">
                            <option value="work">工作</option>
                            <option value="home">家居</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="warehouseDesc" rows="2" placeholder="仓库描述（可选）"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="deleteWarehouseBtn" style="display:none;" onclick="deleteWarehouse()">删除</button>
                    <button type="button" class="btn btn-primary" onclick="saveWarehouse()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 设备Modal -->
    <div class="modal fade" id="deviceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deviceModalTitle">添加设备</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="deviceId">
                    <div class="mb-3">
                        <label class="form-label">所属仓库 *</label>
                        <select class="form-select" id="deviceWarehouse"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">设备名称 *</label>
                        <input type="text" class="form-control" id="deviceName" placeholder="例如：Dell电脑主机">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">类别 *</label>
                        <select class="form-select" id="deviceCategory">
                            <option value="电脑">电脑</option>
                            <option value="显示器">显示器</option>
                            <option value="配件">配件</option>
                            <option value="线缆">线缆</option>
                            <option value="办公设备">办公设备</option>
                            <option value="家具">家具</option>
                            <option value="电器">电器</option>
                            <option value="酒类">酒类</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">标签（用逗号分隔）</label>
                        <input type="text" class="form-control" id="deviceTags" placeholder="例如：神舟,显示器,27寸">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">数量 *</label>
                        <input type="number" class="form-control" id="deviceQuantity" value="1" min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">存放位置</label>
                        <input type="text" class="form-control" id="deviceStorageLocation" placeholder="例如：A区货架2层">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">在库状态</label>
                        <select class="form-select" id="deviceLocationStatus">
                            <option value="in_stock">在库</option>
                            <option value="checked_out">已出库</option>
                        </select>
                    </div>
                    <div class="mb-3" id="destinationField" style="display:none;">
                        <label class="form-label">去向</label>
                        <input type="text" class="form-control" id="deviceDestination" placeholder="例如：同事张三借用">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select class="form-select" id="deviceStatus">
                            <option value="正常">正常</option>
                            <option value="异常">异常</option>
                            <option value="维修中">维修中</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="deviceRemark" rows="2" placeholder="其他说明（可选）"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="deleteDeviceBtn" style="display:none;" onclick="deleteDevice()">删除</button>
                    <button type="button" class="btn btn-primary" onclick="saveDevice()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 出库Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);">
                    <h5 class="modal-title"><i class="bi bi-box-arrow-right"></i> 设备出库</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="checkoutDeviceId">
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle"></i> 确定要将设备 <strong id="checkoutDeviceName"></strong> 出库吗？
                    </div>
                    <div class="mb-3">
                        <label class="form-label">去向</label>
                        <input type="text" class="form-control" id="checkoutDestination" placeholder="例如：同事张三借用">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-warning" onclick="confirmCheckout()">确认出库</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 入库Modal -->
    <div class="modal fade" id="checkinModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%);">
                    <h5 class="modal-title"><i class="bi bi-box-arrow-left"></i> 设备入库</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="checkinDeviceId">
                    <div class="alert alert-success">
                        <i class="bi bi-check-circle"></i> 确定要将设备 <strong id="checkinDeviceName"></strong> 重新入库吗？
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="confirmCheckin()">确认入库</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 标签Modal -->
    <div class="modal fade" id="tagModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tagModalTitle">添加标签</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="tagId">
                    <div class="mb-3">
                        <label class="form-label">标签名称 *</label>
                        <input type="text" class="form-control" id="tagName" placeholder="例如：电脑">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="deleteTagBtn" style="display:none;" onclick="deleteTag()">删除</button>
                    <button type="button" class="btn btn-primary" onclick="saveTag()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:3001/api';
        let currentWarehouseId = null;
        let currentWarehouseName = null;
        let allDevices = [];
        let warehouses = [];
        let tagStats = [];

        // 格式化时间
        function formatTime(timeStr) {
            if (!timeStr) return '';
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        // 格式化日期为 MySQL datetime 格式
        function formatDateTime(date) {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        }

        // 排序设备
        function sortDevices() {
            const sortType = document.getElementById('sortSelect').value;
            let sorted = [...allDevices];
            switch (sortType) {
                case 'name': sorted.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN')); break;
                case 'checkin': sorted.sort((a, b) => !a.checkin_time ? 1 : !b.checkin_time ? -1 : new Date(b.checkin_time) - new Date(a.checkin_time)); break;
                case 'checkout': sorted.sort((a, b) => !a.checkout_time ? 1 : !b.checkout_time ? -1 : new Date(b.checkout_time) - new Date(a.checkout_time)); break;
            }
            renderDevices(sorted);
        }

        // 加载仓库列表
        async function loadWarehouses() {
            try {
                const res = await fetch(`${API_BASE}/warehouses`);
                warehouses = await res.json();
                renderWarehouseList();
                updateWarehouseSelect();
                updateStats();
                if (warehouses.length > 0 && !currentWarehouseId) {
                    selectWarehouse(warehouses[0].id, warehouses[0].name);
                }
            } catch (e) { console.error('加载仓库失败:', e); }
        }

        // 加载标签统计
        async function loadTagStats() {
            try {
                const res = await fetch(`${API_BASE}/tag-stats`);
                tagStats = await res.json();
                renderTagStats();
            } catch (e) { console.error('加载标签统计失败:', e); }
        }

        // 更新仓库下拉框
        function updateWarehouseSelect() {
            const select = document.getElementById('deviceWarehouse');
            select.innerHTML = warehouses.map(w => `<option value="${w.name}">${w.name}</option>`).join('');
            if (currentWarehouseName) select.value = currentWarehouseName;
        }

        // 渲染仓库列表
        function renderWarehouseList() {
            const list = document.getElementById('warehouseList');
            list.innerHTML = warehouses.map(w => {
                const tagHtml = Object.entries(w.tagCount || {}).map(([tag, count]) =>
                    `<span class="tag-badge">${tag} <span class="tag-count">${count}</span></span>`
                ).join('');
                const inStock = w.inStockCount || 0;
                const checkedOut = w.checkedOutCount || 0;
                return `
                    <div class="nav-link warehouse-card ${w.type}" data-id="${w.id}" data-name="${w.name}" onclick="selectWarehouse(${w.id}, '${w.name}')">
                        <div class="warehouse-actions" onclick="event.stopPropagation()">
                            <button class="btn btn-sm btn-outline-light" onclick="editWarehouse(${w.id})" title="编辑"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteWarehouseConfirm(${w.id})" title="删除"><i class="bi bi-trash"></i></button>
                        </div>
                        <i class="bi ${w.type === 'work' ? 'bi-briefcase' : w.type === 'home' ? 'bi-house' : 'bi-box'}"></i> ${w.name}
                        <small class="d-block text-muted">${w.description || ''}</small>
                        <div class="mt-1">
                            <span class="badge" style="background:#107c10;color:#fff;font-size:10px;">在库 ${inStock}</span>
                            <span class="badge" style="background:#eaa300;color:#fff;font-size:10px;">出库 ${checkedOut}</span>
                        </div>
                        ${tagHtml ? `<div class="mt-1">${tagHtml}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // 渲染标签统计
        function renderTagStats() {
            const list = document.getElementById('tagStatsList');
            if (tagStats.length === 0) { list.innerHTML = '<div class="text-muted small">暂无标签数据</div>'; return; }
            list.innerHTML = tagStats.map(tag => `
                <div class="tag-list-item">
                    <span><i class="bi bi-tag"></i> ${tag.name} <span class="count">${tag.total_count}</span></span>
                    <div class="tag-actions">
                        <button class="btn btn-sm btn-outline-light" onclick="editTag(${tag.id}, '${tag.name}')" title="编辑"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteTagConfirm(${tag.id})" title="删除"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // 选择仓库
        async function selectWarehouse(id, name) {
            currentWarehouseId = id;
            currentWarehouseName = name;
            document.querySelectorAll('.warehouse-card').forEach(card => { card.classList.toggle('active', card.dataset.id == id); });
            document.getElementById('currentWarehouseTitle').innerHTML = `<i class="bi bi-folder"></i> ${name}`;
            document.getElementById('mobileWarehouseTitle').textContent = name;
            document.getElementById('deviceWarehouse').value = name;
            await loadDevices();
            // 移动端选择仓库后自动收起侧边栏
            if (window.innerWidth <= 768) toggleSidebar();
        }

        // 加载设备
        async function loadDevices() {
            if (!currentWarehouseId) return;
            try {
                const res = await fetch(`${API_BASE}/devices?warehouseId=${currentWarehouseId}`);
                allDevices = await res.json();
                renderDevices(allDevices);
                updateStats();
            } catch (e) { console.error('加载设备失败:', e); }
        }

        // 渲染设备列表
        function renderDevices(devices) {
            const list = document.getElementById('deviceList');
            if (devices.length === 0) {
                list.innerHTML = `<div class="text-center text-muted py-5"><i class="bi bi-inbox" style="font-size: 48px;"></i><p class="mt-2">该仓库暂无设备，点击上方"添加设备"按钮</p></div>`;
                return;
            }

            const inStockDevices = devices.filter(d => d.location_status === 'in_stock' || !d.location_status);
            const checkedOutDevices = devices.filter(d => d.location_status === 'checked_out');
            const statusClass = { '正常': 'status-normal', '异常': 'status-abnormal', '维修中': 'status-maintenance' };

            const renderDeviceItem = (device, isOut) => {
                const tagHtml = [...new Set(device.tags || [])].map(tag => `<span class="tag-badge">${tag}</span>`).join('');
                const actionBtn = isOut
                    ? `<button class="btn btn-sm btn-outline-success checkin-btn" onclick="showCheckinModal(${device.id}, '${device.name}')" title="入库"><i class="bi bi-box-arrow-left"></i> 入库</button>`
                    : `<button class="btn btn-sm btn-outline-warning checkout-btn" onclick="showCheckoutModal(${device.id}, '${device.name}')" title="出库"><i class="bi bi-box-arrow-right"></i> 出库</button>`;
                const destinationTag = isOut && device.destination ? `<span class="destination-tag ms-2"><i class="bi bi-geo-alt"></i> ${device.destination}</span>` : '';
                const timeInfo = isOut
                    ? (device.checkout_time ? ' | 出库: ' + formatTime(device.checkout_time) : '')
                    : (device.checkin_time ? ' | 入库: ' + formatTime(device.checkin_time) : '');

                return `
                    <div class="device-item ${isOut ? 'checked-out' : ''}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <strong>${device.name}</strong>
                                <span class="status-badge ${statusClass[device.status]} ms-2">${device.status}</span>
                                ${destinationTag}
                                ${tagHtml ? `<span class="ms-1">${tagHtml}</span>` : ''}
                                <div class="text-muted small mt-1">数量: ${device.quantity} | 存放位置: ${device.storage_location || '未设置'} | 仓库: ${device.warehouse_name || currentWarehouseName || '未知'}${timeInfo} | 备注: ${device.remark || '无'}</div>
                            </div>
                            <div class="d-flex gap-2">
                                ${actionBtn}
                                <button class="btn btn-sm btn-outline-primary" onclick="editDevice(${device.id})"><i class="bi bi-pencil"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            };

            const inStockHtml = inStockDevices.length > 0 ? inStockDevices.map(d => renderDeviceItem(d, false)).join('') : '<div class="text-center text-muted py-3">暂无在库设备</div>';
            const checkedOutHtml = checkedOutDevices.length > 0 ? checkedOutDevices.map(d => renderDeviceItem(d, true)).join('') : '<div class="text-center text-muted py-3">暂无已出库设备</div>';

            list.innerHTML = `
                <div class="device-section in-stock-section">
                    <div class="device-section-header" onclick="toggleSection('inStockBody')">
                        <h6><i class="bi bi-box-seam"></i> 在库设备 <span class="badge bg-success">${inStockDevices.length}</span></h6>
                        <i class="bi bi-chevron-down chevron-icon"></i>
                    </div>
                    <div class="device-section-body" id="inStockBody">${inStockHtml}</div>
                </div>
                <div class="device-section checked-out-section">
                    <div class="device-section-header" onclick="toggleSection('checkedOutBody')">
                        <h6><i class="bi bi-box-arrow-right"></i> 已出库设备 <span class="badge bg-warning text-dark">${checkedOutDevices.length}</span></h6>
                        <i class="bi bi-chevron-down chevron-icon collapsed"></i>
                    </div>
                    <div class="device-section-body" id="checkedOutBody" style="display: none;">${checkedOutHtml}</div>
                </div>
            `;
        }

        // 切换列表展开/折叠
        function toggleSection(bodyId) {
            const body = document.getElementById(bodyId);
            const icon = body.previousElementSibling.querySelector('.chevron-icon');
            body.style.display = body.style.display === 'none' ? 'block' : 'none';
            icon.classList.toggle('collapsed');
        }

        // 搜索过滤
        function filterDevices() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allDevices.filter(d => d.name.toLowerCase().includes(keyword) || (d.tags || []).some(t => t.toLowerCase().includes(keyword)) || (d.destination && d.destination.toLowerCase().includes(keyword)));
            renderDevices(filtered);
        }

        // 更新统计（仓库在库/出库数量）
        async function updateStats() {
            try {
                const res = await fetch(`${API_BASE}/devices`);
                const allData = await res.json();
                warehouses = warehouses.map(w => {
                    const wd = allData.filter(d => d.warehouse_name === w.name);
                    w.inStockCount = wd.filter(d => d.location_status === 'in_stock' || !d.location_status).length;
                    w.checkedOutCount = wd.filter(d => d.location_status === 'checked_out').length;
                    return w;
                });
                renderWarehouseList();
            } catch (e) { console.error('更新统计失败:', e); }
        }

        // ============ 出库操作 ============
        function showCheckoutModal(id, name) {
            document.getElementById('checkoutDeviceId').value = id;
            document.getElementById('checkoutDeviceName').textContent = name;
            document.getElementById('checkoutDestination').value = '';
            new bootstrap.Modal(document.getElementById('checkoutModal')).show();
        }

        async function confirmCheckout() {
            const id = document.getElementById('checkoutDeviceId').value;
            const destination = document.getElementById('checkoutDestination').value;
            const device = allDevices.find(d => d.id == id);
            try {
                await fetch(`${API_BASE}/devices/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        warehouseName: device.warehouse_name, name: device.name, tag_name: device.tag_name || device.category,
                        status: device.status, quantity: device.quantity, storage_location: device.storage_location,
                        location_status: 'checked_out', destination: destination || '', remark: device.remark, tags: device.tags,
                        checkin_time: device.checkin_time, checkout_time: formatDateTime(new Date())
                    })
                });
                bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
                await loadDevices(); await loadWarehouses(); await loadTagStats();
            } catch (e) { alert('出库失败: ' + e.message); }
        }

        // ============ 入库操作 ============
        function showCheckinModal(id, name) {
            document.getElementById('checkinDeviceId').value = id;
            document.getElementById('checkinDeviceName').textContent = name;
            new bootstrap.Modal(document.getElementById('checkinModal')).show();
        }

        async function confirmCheckin() {
            const id = document.getElementById('checkinDeviceId').value;
            const device = allDevices.find(d => d.id == id);
            if (!device) { alert('未找到设备信息'); return; }
            try {
                await fetch(`${API_BASE}/devices/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        warehouseName: device.warehouse_name, name: device.name, tag_name: device.tag_name || device.category,
                        status: device.status, quantity: device.quantity, storage_location: device.storage_location,
                        location_status: 'in_stock', destination: '', remark: device.remark, tags: device.tags,
                        checkin_time: formatDateTime(new Date()), checkout_time: null
                    })
                });
                bootstrap.Modal.getInstance(document.getElementById('checkinModal')).hide();
                await loadDevices(); await loadWarehouses(); await loadTagStats();
            } catch (e) { alert('入库失败: ' + e.message); }
        }

        // ============ 仓库操作 ============
        function showWarehouseModal(id = null) {
            const modal = new bootstrap.Modal(document.getElementById('warehouseModal'));
            document.getElementById('warehouseModalTitle').textContent = id ? '编辑仓库' : '新建仓库';
            document.getElementById('deleteWarehouseBtn').style.display = id ? 'block' : 'none';
            if (id) {
                const w = warehouses.find(wh => wh.id === id);
                document.getElementById('warehouseId').value = w.id;
                document.getElementById('warehouseName').value = w.name;
                document.getElementById('warehouseType').value = w.type;
                document.getElementById('warehouseDesc').value = w.description || '';
            } else {
                document.getElementById('warehouseId').value = '';
                document.getElementById('warehouseName').value = '';
                document.getElementById('warehouseType').value = 'work';
                document.getElementById('warehouseDesc').value = '';
            }
            modal.show();
        }

        function editWarehouse(id) { showWarehouseModal(id); }

        function deleteWarehouseConfirm(id) {
            if (!confirm('删除仓库将同时删除该仓库下所有设备，确定要删除吗？')) return;
            currentWarehouseId = id;
            deleteWarehouse();
        }

        async function saveWarehouse() {
            const id = document.getElementById('warehouseId').value;
            const data = { name: document.getElementById('warehouseName').value, type: document.getElementById('warehouseType').value, description: document.getElementById('warehouseDesc').value };
            if (!data.name) { alert('请输入仓库名称'); return; }
            try {
                if (id) await fetch(`${API_BASE}/warehouses/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                else await fetch(`${API_BASE}/warehouses`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                bootstrap.Modal.getInstance(document.getElementById('warehouseModal')).hide();
                await loadWarehouses();
            } catch (e) { alert('保存失败: ' + e.message); }
        }

        async function deleteWarehouse() {
            try {
                await fetch(`${API_BASE}/warehouses/${currentWarehouseId}`, { method: 'DELETE' });
                currentWarehouseId = null; currentWarehouseName = null;
                const modalInstance = bootstrap.Modal.getInstance(document.getElementById('warehouseModal'));
                if (modalInstance) modalInstance.hide();
                await loadWarehouses(); await loadTagStats();
                document.getElementById('deviceList').innerHTML = `<div class="text-center text-muted py-5"><i class="bi bi-inbox" style="font-size: 48px;"></i><p class="mt-2">请先选择或创建一个仓库</p></div>`;
            } catch (e) { alert('删除失败: ' + e.message); }
        }

        // ============ 设备操作 ============
        function showDeviceModal(id = null) {
            if (warehouses.length === 0) { alert('请先创建仓库'); return; }
            const modal = new bootstrap.Modal(document.getElementById('deviceModal'));
            document.getElementById('deviceModalTitle').textContent = id ? '编辑设备' : '添加设备';
            updateWarehouseSelect();
            document.getElementById('deviceLocationStatus').onchange = function() { document.getElementById('destinationField').style.display = this.value === 'checked_out' ? 'block' : 'none'; };

            if (id) {
                const d = allDevices.find(dev => dev.id === id);
                document.getElementById('deviceId').value = d.id;
                document.getElementById('deviceWarehouse').value = d.warehouse_name;
                document.getElementById('deviceName').value = d.name;
                document.getElementById('deviceCategory').value = d.tag_name || d.category || '电脑';
                document.getElementById('deviceTags').value = (d.tags || []).join(', ');
                document.getElementById('deviceQuantity').value = d.quantity;
                document.getElementById('deviceStorageLocation').value = d.storage_location || '';
                document.getElementById('deviceLocationStatus').value = d.location_status || 'in_stock';
                document.getElementById('deviceDestination').value = d.destination || '';
                document.getElementById('deviceStatus').value = d.status;
                document.getElementById('deviceRemark').value = d.remark || '';
                document.getElementById('deleteDeviceBtn').style.display = 'block';
                document.getElementById('destinationField').style.display = (d.location_status === 'checked_out') ? 'block' : 'none';
            } else {
                document.getElementById('deviceId').value = '';
                document.getElementById('deviceName').value = '';
                document.getElementById('deviceCategory').value = '电脑';
                document.getElementById('deviceTags').value = '';
                document.getElementById('deviceQuantity').value = 1;
                document.getElementById('deviceStorageLocation').value = '';
                document.getElementById('deviceLocationStatus').value = 'in_stock';
                document.getElementById('deviceDestination').value = '';
                document.getElementById('deviceStatus').value = '正常';
                document.getElementById('deviceRemark').value = '';
                document.getElementById('deleteDeviceBtn').style.display = 'none';
                document.getElementById('destinationField').style.display = 'none';
                if (currentWarehouseName) document.getElementById('deviceWarehouse').value = currentWarehouseName;
            }
            modal.show();
        }

        function editDevice(id) { showDeviceModal(id); }

        async function saveDevice() {
            const id = document.getElementById('deviceId').value;
            const tags = [...new Set(document.getElementById('deviceTags').value.split(',').map(t => t.trim()).filter(t => t))];
            const location_status = document.getElementById('deviceLocationStatus').value;
            const destination = location_status === 'checked_out' ? document.getElementById('deviceDestination').value : '';

            const data = {
                warehouseName: document.getElementById('deviceWarehouse').value,
                name: document.getElementById('deviceName').value,
                tag_name: document.getElementById('deviceCategory').value,
                quantity: parseInt(document.getElementById('deviceQuantity').value),
                storage_location: document.getElementById('deviceStorageLocation').value,
                location_status: location_status,
                destination: destination,
                status: document.getElementById('deviceStatus').value,
                remark: document.getElementById('deviceRemark').value,
                tags: tags
            };

            if (!data.name) { alert('请输入设备名称'); return; }

            try {
                if (id) await fetch(`${API_BASE}/devices/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                else await fetch(`${API_BASE}/devices`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                bootstrap.Modal.getInstance(document.getElementById('deviceModal')).hide();
                await loadDevices(); await loadWarehouses(); await loadTagStats();
            } catch (e) { alert('保存失败: ' + e.message); }
        }

        async function deleteDevice() {
            if (!confirm('确定要删除该设备吗？')) return;
            const id = document.getElementById('deviceId').value;
            try {
                await fetch(`${API_BASE}/devices/${id}`, { method: 'DELETE' });
                bootstrap.Modal.getInstance(document.getElementById('deviceModal')).hide();
                await loadDevices(); await loadWarehouses(); await loadTagStats();
            } catch (e) { alert('删除失败: ' + e.message); }
        }

        // ============ 标签操作 ============
        function showTagModal(id = null) {
            const modal = new bootstrap.Modal(document.getElementById('tagModal'));
            document.getElementById('tagModalTitle').textContent = id ? '编辑标签' : '添加标签';
            document.getElementById('deleteTagBtn').style.display = id ? 'block' : 'none';
            if (id) {
                const tag = tagStats.find(t => t.id === id);
                document.getElementById('tagId').value = tag.id;
                document.getElementById('tagName').value = tag.name;
            } else {
                document.getElementById('tagId').value = '';
                document.getElementById('tagName').value = '';
            }
            modal.show();
        }

        function editTag(id, name) { showTagModal(id); }

        function deleteTagConfirm(id) {
            if (!confirm('确定要删除该标签吗？')) return;
            document.getElementById('tagId').value = id;
            deleteTag();
        }

        async function saveTag() {
            const id = document.getElementById('tagId').value;
            const data = { name: document.getElementById('tagName').value };
            if (!data.name) { alert('请输入标签名称'); return; }
            try {
                if (id) await fetch(`${API_BASE}/tags/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                else await fetch(`${API_BASE}/tags`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
                await loadTagStats();
            } catch (e) { alert('保存失败: ' + e.message); }
        }

        async function deleteTag() {
            const id = document.getElementById('tagId').value;
            try {
                await fetch(`${API_BASE}/tags/${id}`, { method: 'DELETE' });
                bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
                await loadTagStats(); await loadWarehouses(); await loadDevices();
            } catch (e) { alert('删除失败: ' + e.message); }
        }

        // 侧边栏收纳/展开控制（移动端）
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        // 侧边栏收纳/展开控制（PC端）
        function toggleSidebarPC() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // 侧边栏拖拽调整宽度
        function initSidebarResize() {
            const handle = document.getElementById('sidebarResizeHandle');
            const sidebar = document.getElementById('sidebar');
            let isResizing = false;
            let startX = 0;
            let startWidth = 0;

            handle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = sidebar.offsetWidth;
                handle.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const diff = e.clientX - startX;
                const newWidth = Math.max(200, Math.min(400, startWidth + diff));
                sidebar.style.width = newWidth + 'px';
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    handle.classList.remove('dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async () => {
            initSidebarResize();
            await loadWarehouses();
            await loadTagStats();
            if (warehouses.length > 0) selectWarehouse(warehouses[0].id, warehouses[0].name);
        });
    </script>
</body>
</html>
