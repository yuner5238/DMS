<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备详情 — DMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    <style>
        /* Device detail page — override body scroll lock */
        body {
            overflow: auto;
            height: auto;
        }

        /* Device detail page exclusive styles */
        .device-page {
            min-height: 100vh;
            background: var(--bg-main);
            position: relative;
        }



        /* Top Bar */
        .dp-topbar {
            position: sticky;
            top: 0;
            z-index: var(--z-header);
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0;
        }

        .dp-topbar-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dp-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .dp-back:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .dp-back .bi {
            font-size: 1rem;
            transition: transform var(--transition-fast);
        }

        .dp-back:hover .bi {
            transform: translateX(-3px);
        }

        .dp-topbar-title {
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .dp-topbar-spacer {
            width: 80px;
        }

        /* Main Container */
        .dp-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px;
            position: relative;
            z-index: 1;
        }

        /* Loading State */
        .dp-loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .dp-loading-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
            opacity: 0.4;
            animation: dpPulse 2s var(--ease-in-out) infinite;
        }

        @keyframes dpPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.08); }
        }

        .dp-loading p {
            font-size: var(--text-sm);
        }

        /* Error State */
        .dp-error {
            text-align: center;
            padding: 80px 20px;
        }

        .dp-error-icon {
            font-size: 3rem;
            color: var(--danger);
            opacity: 0.6;
            margin-bottom: 20px;
        }

        .dp-error p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* Detail Card */
        .dp-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        /* Card Header */
        .dp-card-header {
            padding: 28px 32px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .dp-card-header h4 {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin: 0;
            flex: 1;
            min-width: 0;
        }

        .dp-card-header h4 input {
            font-size: var(--text-2xl);
            font-weight: 700;
            border: none;
            border-bottom: 2px solid var(--primary);
            outline: none;
            background: transparent;
            width: 100%;
            padding: 4px 0;
            color: var(--text-primary);
            font-family: var(--font-sans);
        }

        /* Status Badge */
        .dp-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
            white-space: nowrap;
        }

        .dp-status .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .dp-status.status-normal {
            background: var(--success-bg);
            color: #059669;
        }
        .dp-status.status-normal .status-dot {
            background: #3B8C6E;
        }

        .dp-status.status-abnormal {
            background: var(--danger-bg);
            color: #C53030;
        }
        .dp-status.status-abnormal .status-dot {
            background: #C53030;
        }

        .dp-status.status-maintenance {
            background: var(--warning-bg);
            color: #B8860B;
        }
        .dp-status.status-maintenance .status-dot {
            background: #B8860B;
        }

        /* Card Body */
        .dp-card-body {
            padding: 24px 32px 32px;
        }

        .dp-field {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 12px 24px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
            align-items: baseline;
        }

        .dp-field:last-child {
            border-bottom: none;
        }

        .dp-field-label {
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .dp-field-value {
            font-size: var(--text-sm);
            color: var(--text-primary);
            line-height: 1.6;
            word-break: break-word;
        }

        /* Device ID Badge */
        .dp-id-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 12px;
            border-radius: var(--radius-full);
            background: var(--primary-bg);
            color: var(--primary);
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* Tag Badge */
        .dp-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            background: var(--bg-hover);
            color: var(--text-secondary);
            font-size: var(--text-xs);
            font-weight: 500;
            margin-right: 6px;
            margin-bottom: 4px;
        }

        /* Rich Text Content */
        .dp-rich-text {
            font-size: var(--text-sm);
            line-height: 1.8;
            color: var(--text-primary);
        }

        .dp-rich-text img {
            max-width: 100%;
            border-radius: var(--radius-sm);
            margin: 8px 0;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .dp-rich-text img:hover {
            box-shadow: var(--shadow-md);
        }

        /* Card Actions */
        .dp-card-actions {
            padding: 16px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: var(--bg-main);
        }

        .dp-card-actions .btn {
            padding: 10px 22px;
            font-size: var(--text-sm);
            font-weight: 600;
            border-radius: var(--radius-sm);
        }

        /* Edit actions */
        .dp-edit-actions {
            padding: 16px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: var(--bg-main);
        }

        /* Edit Form */
        .dp-edit-field {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 12px 24px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
            align-items: center;
        }

        .dp-edit-label {
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .dp-edit-input {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: var(--bg-input);
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-xs);
        }

        .dp-edit-input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: var(--shadow-sm), 0 0 0 3px rgba(105,108,255,0.1);
        }

        .dp-edit-select {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: var(--bg-input);
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-xs);
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%239A95B5' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
            padding-right: 36px;
        }

        .dp-edit-select:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: var(--shadow-sm), 0 0 0 3px rgba(105,108,255,0.1);
        }

        .dp-edit-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: var(--bg-input);
            resize: vertical;
            min-height: 100px;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-xs);
        }

        .dp-edit-textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: var(--shadow-sm), 0 0 0 3px rgba(105,108,255,0.1);
        }

        /* Attachment List */
        .dp-attachment-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .dp-attachment-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            background: var(--bg-hover);
            transition: all var(--transition-fast);
        }

        .dp-attachment-item:hover {
            background: var(--border-light);
        }

        .dp-attachment-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xs);
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            letter-spacing: 0.04em;
        }

        .dp-attachment-icon.pdf { background: #EF4444; }
        .dp-attachment-icon.doc { background: #3B82F6; }
        .dp-attachment-icon.xls { background: #10B981; }
        .dp-attachment-icon.img { background: #8B5CF6; }
        .dp-attachment-icon.zip { background: #F59E0B; }
        .dp-attachment-icon.other { background: #6B7280; }

        .dp-attachment-info {
            flex: 1;
            min-width: 0;
        }

        .dp-attachment-name {
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dp-attachment-name a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .dp-attachment-name a:hover {
            color: var(--primary);
        }

        .dp-attachment-meta {
            font-size: var(--text-2xs);
            color: var(--text-muted);
            margin-top: 2px;
        }

        .dp-attachment-actions .btn-sm-delete {
            padding: 4px 12px;
            border-radius: var(--radius-xs);
            border: 1px solid rgba(239,68,68,0.2);
            background: transparent;
            color: var(--danger);
            font-size: var(--text-2xs);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
        }

        .dp-attachment-actions .btn-sm-delete:hover {
            background: var(--danger-bg);
            border-color: rgba(239,68,68,0.4);
        }

        .dp-check-icon {
            color: var(--success);
            font-size: 18px;
            flex-shrink: 0;
        }

        /* Image Fullscreen Overlay (JS-created) */
        .image-fullscreen-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,12,30,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: fadeIn 0.2s var(--ease-out);
        }

        .image-fullscreen-img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: var(--radius);
            box-shadow: var(--shadow-xl);
            animation: modalSlideIn 0.3s var(--ease-out);
            cursor: default;
        }

        .image-fullscreen-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .image-fullscreen-close:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dp-topbar-inner {
                padding: 12px 16px;
            }
            .dp-topbar-spacer {
                width: 0;
            }
            .dp-container {
                padding: 16px;
            }
            .dp-card-header {
                padding: 20px 20px 16px;
                flex-direction: column;
                align-items: flex-start;
            }
            .dp-card-body {
                padding: 16px 20px 20px;
            }
            .dp-field {
                grid-template-columns: 1fr;
                gap: 4px;
                padding: 10px 0;
            }
            .dp-edit-field {
                grid-template-columns: 1fr;
                gap: 4px;
                padding: 10px 0;
            }
            .dp-card-actions {
                padding: 12px 20px;
                flex-wrap: wrap;
            }
            .dp-edit-actions {
                padding: 12px 20px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="device-page">
        <!-- Top Bar -->
        <div class="dp-topbar">
            <div class="dp-topbar-inner">
                <a href="index.html" class="dp-back">
                    <i class="bi bi-arrow-left"></i>
                    返回设备列表
                </a>
                <span class="dp-topbar-title">设备详情</span>
                <div class="dp-topbar-spacer"></div>
            </div>
        </div>

        <!-- Detail Container -->
        <div class="dp-container" id="detailContainer">
            <div class="dp-loading">
                <div class="dp-loading-icon">
                    <i class="bi bi-hourglass-split"></i>
                </div>
                <p>加载设备信息...</p>
            </div>
        </div>

        <!-- Hidden File Input for Attachments -->
        <input type="file" id="attachmentFileInput" style="display:none;" onchange="handleAttachmentUpload(this)">
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ================================================================
         APPLICATION LOGIC (fully self-contained for detail page)
         ================================================================ -->
    <script>
        // ===== API 配置 =====
        const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
            ? '/api'
            : '/api';

        // ===== 公开配置 =====
        window.S3_PUBLIC_URL = '';

        async function loadPublicConfig() {
            try {
                const res = await fetch('/api/config');
                const cfg = await res.json();
                window.S3_PUBLIC_URL = cfg.s3PublicUrl || '';
            } catch (e) {
                console.warn('加载公开配置失败:', e);
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('device_id');

        function formatDate(timeStr) {
            if (!timeStr) return '-';
            const date = new Date(timeStr);
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
        }

        function formatDateTime(timeStr) {
            if (!timeStr) return '-';
            const date = new Date(timeStr);
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function formatDateOnly(timeStr) {
            if (!timeStr) return '-';
            const date = new Date(timeStr);
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
        }

        function decodeRichText(text) {
            if (!text) return '';
            let html = text.replace(/\n/g, '<br>');
            html = html.replace(/\[B\]([\s\S]*?)\[\/B\]/gi, '<b>$1</b>');
            html = html.replace(/\[I\]([\s\S]*?)\[\/I\]/gi, '<i>$1</i>');
            html = html.replace(/\[U\]([\s\S]*?)\[\/U\]/gi, '<u>$1</u>');
            html = html.replace(/\[S\]([\s\S]*?)\[\/S\]/gi, '<s>$1</s>');
            html = html.replace(/\[COLOR=([^\]]+)\]([\s\S]*?)\[\/COLOR\]/gi, '<font color="$1">$2</font>');
            html = html.replace(/\[SIZE=([^\]]+)\]([\s\S]*?)\[\/SIZE\]/gi, '<font size="$1">$2</font>');
            html = html.replace(/(<br>\s*){2,}/g, '<br><br>');
            html = html.replace(/https?:\/\/[^"'\s>]*\/images\/(\d+)\/([^"'\s>]+)/gi, '/api/images/$1/$2');
            html = html.replace(/\s*onerror\s*=\s*(?:"[^"]*"|'[^']*'|\S+)/gi, '');
            html = html.replace(/<img([^>]*)>/gi, function(match, attrs) {
                return `<img${attrs} onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<span style=color:#dc3545;font-size:12px;>[图片加载失败]</span>');">`;
            });
            return html;
        }

        const statusClass = { '正常': 'status-normal', '异常': 'status-abnormal', '维修中': 'status-maintenance' };

        async function loadDeviceDetail() {
            if (!deviceId) { showError('设备ID无效'); return; }
            try {
                let res;
                res = await fetch(`${API_BASE}/devices/by-code/${deviceId}`);
                if (!res.ok) {
                    res = await fetch(`${API_BASE}/devices/${deviceId}`);
                }
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                const device = await res.json();
                if (device.error) throw new Error(device.error);
                renderDeviceDetail(device);
            } catch (e) {
                console.error('加载设备详情失败:', e);
                showError('加载设备详情失败: ' + e.message);
            }
        }

        function renderDeviceDetail(device) {
            currentDevice = device;
            const container = document.getElementById('detailContainer');
            let locationText = device.storage_location || '在库';
            if (device.location_status === 'checked_out') {
                locationText = device.destination || '已出库';
            }
            const statusBadge = `<span class="dp-status ${statusClass[device.status] || 'status-normal'}"><span class="status-dot"></span>${device.status || '未知'}</span>`;
            const html = `
                <div class="dp-card">
                    <div class="dp-card-header">
                        <h4>${escapeHtml(device.name || '未命名设备')}</h4>
                        ${statusBadge}
                    </div>
                    <div class="dp-card-body">
                        <div class="dp-field"><div class="dp-field-label">设备ID</div><div class="dp-field-value">${device.device_id ? `<span class="dp-id-badge">${device.device_id}</span>` : '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">所属仓库</div><div class="dp-field-value">${escapeHtml(device.warehouse_name) || '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">设备标签</div><div class="dp-field-value">${(() => {
                            let deviceTags = [];
                            if (device.tag_names) {
                                const field = device.tag_names.trim();
                                if (field.startsWith('[')) { try { deviceTags = JSON.parse(field); } catch (e) {} }
                                else if (field) { deviceTags = field.split(',').map(t => t.trim()).filter(t => t); }
                            } else if (device.tag_name) { deviceTags = [device.tag_name]; }
                            return deviceTags.length > 0 ? deviceTags.map(tag => `<span class="dp-tag">${escapeHtml(tag)}</span>`).join('') : '-';
                        })()}</div></div>
                        <div class="dp-field"><div class="dp-field-label">设备数量</div><div class="dp-field-value">${device.quantity || '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">所属路径</div><div class="dp-field-value">${escapeHtml(device.department_path) || '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">规格型号</div><div class="dp-field-value">${escapeHtml(device.spec_model) || '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">来源</div><div class="dp-field-value">${escapeHtml(device.source) || '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">序列号</div><div class="dp-field-value">${escapeHtml(device.serial_number) || '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">负责人</div><div class="dp-field-value">${escapeHtml(device.responsible_person) || '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">存放位置</div><div class="dp-field-value">${escapeHtml(locationText)}</div></div>
                        <div class="dp-field"><div class="dp-field-label">入库时间</div><div class="dp-field-value">${device.checkin_time ? formatDateTime(device.checkin_time) : '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">到期日期</div><div class="dp-field-value">${device.expiry_date ? formatDateOnly(device.expiry_date) : '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">创建时间</div><div class="dp-field-value">${device.created_at ? formatDateTime(device.created_at) : '-'}</div></div>
                        <div class="dp-field"><div class="dp-field-label">更新时间</div><div class="dp-field-value">${device.updated_at ? formatDateTime(device.updated_at) : '-'}</div></div>
                        <div class="dp-field" style="align-items:start;">
                            <div class="dp-field-label" style="padding-top:6px;">附件</div>
                            <div class="dp-field-value" style="width:100%;">
                                <div class="dp-attachment-list" id="detailAttachmentsList">
                                    <div style="font-size:12px;color:var(--text-muted);padding:4px 0;">加载中...</div>
                                </div>
                            </div>
                        </div>
                        <div class="dp-field" style="align-items:start;">
                            <div class="dp-field-label">备注</div>
                            <div class="dp-field-value">${device.remark ? `<div class="dp-rich-text">${decodeRichText(device.remark)}</div>` : '-'}</div>
                        </div>
                    </div>
                    <div class="dp-card-actions">
                        <button class="btn btn-primary" onclick="editDevice()"><i class="bi bi-pencil"></i> 编辑设备</button>
                        <button class="btn btn-danger" onclick="deleteDevice(${device.id}, '${escapeOnClick(device.name)}')"><i class="bi bi-trash"></i> 删除设备</button>
                    </div>
                </div>`;
            container.innerHTML = html;
            container.addEventListener('dblclick', function(e) {
                if (e.target.tagName === 'IMG') { e.preventDefault(); showImageFullscreen(e.target.src); }
            });
            if (device.device_id) loadDeviceAttachments(device.device_id);
        }

        function showImageFullscreen(src) {
            const existing = document.querySelector('.image-fullscreen-overlay');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.className = 'image-fullscreen-overlay';
            overlay.innerHTML = `<div class="image-fullscreen-close"><i class="bi bi-x-lg"></i></div><img src="${src}" class="image-fullscreen-img" />`;
            overlay.addEventListener('click', () => overlay.remove());
            overlay.querySelector('.image-fullscreen-img').addEventListener('click', (e) => e.stopPropagation());
            document.addEventListener('keydown', function onEsc(e) {
                if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onEsc); }
            });
            document.body.appendChild(overlay);
        }

        function showError(message) {
            document.getElementById('detailContainer').innerHTML = `
                <div class="dp-error">
                    <div class="dp-error-icon"><i class="bi bi-exclamation-triangle"></i></div>
                    <p>${escapeHtml(message)}</p>
                    <a href="index.html" class="btn btn-primary"><i class="bi bi-arrow-left"></i> 返回设备列表</a>
                </div>`;
        }

        let currentDevice = null;

        function editDevice() { if (!currentDevice) return; renderEditForm(currentDevice); }
        function cancelEdit() { if (!currentDevice) return; renderDeviceDetail(currentDevice); }

        async function renderEditForm(device) {
            const container = document.getElementById('detailContainer');
            const card = container.querySelector('.dp-card');
            if (!card) return;
            let warehouseOptions = '<option value="">无仓库</option>';
            try {
                const res = await fetch(`${API_BASE}/warehouses`);
                const warehouses = await res.json();
                warehouseOptions += warehouses.map(w => `<option value="${w.name}" ${w.name === device.warehouse_name ? 'selected' : ''}>${w.name}</option>`).join('');
            } catch (e) {
                warehouseOptions += device.warehouse_name ? `<option value="${device.warehouse_name}" selected>${device.warehouse_name}</option>` : '';
            }
            let tagStr = '';
            if (device.tag_names) {
                const field = device.tag_names.trim();
                if (field.startsWith('[')) { try { tagStr = JSON.parse(field).join(', '); } catch (e) {} }
                else { tagStr = field; }
            } else if (device.tag_name) { tagStr = device.tag_name; }
            const isCheckedOut = device.location_status === 'checked_out';
            const header = card.querySelector('.dp-card-header h4');
            if (header) {
                header.innerHTML = `<input type="text" id="editDeviceName" value="${escapeHtml(device.name || '')}" placeholder="设备名称">`;
            }
            const body = card.querySelector('.dp-card-body');
            body.innerHTML = `
                <div class="dp-edit-field"><div class="dp-edit-label">设备ID</div><div class="dp-field-value"><span class="dp-id-badge">${device.device_id || '-'}</span><small style="color:var(--text-muted);margin-left:8px;">（不可修改）</small></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">所属仓库</div><div class="dp-field-value"><select id="editWarehouse" class="dp-edit-select">${warehouseOptions}</select></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">设备标签</div><div class="dp-field-value"><input type="text" id="editTags" class="dp-edit-input" value="${escapeHtml(tagStr)}" placeholder="多个标签用逗号分隔"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">设备数量</div><div class="dp-field-value"><input type="number" id="editQuantity" class="dp-edit-input" value="${device.quantity || 1}" min="1"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">所属路径</div><div class="dp-field-value"><input type="text" id="editDepartmentPath" class="dp-edit-input" value="${escapeHtml(device.department_path || '')}" placeholder="公司或部门"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">规格型号</div><div class="dp-field-value"><input type="text" id="editSpecModel" class="dp-edit-input" value="${escapeHtml(device.spec_model || '')}" placeholder="例如：联想 E14"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">来源</div><div class="dp-field-value"><input type="text" id="editSource" class="dp-edit-input" value="${escapeHtml(device.source || '')}" placeholder="例如：淘宝采购"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">序列号</div><div class="dp-field-value"><input type="text" id="editSerialNumber" class="dp-edit-input" value="${escapeHtml(device.serial_number || '')}" placeholder="设备序列号"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">负责人</div><div class="dp-field-value"><input type="text" id="editResponsiblePerson" class="dp-edit-input" value="${escapeHtml(device.responsible_person || '')}"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">设备状态</div><div class="dp-field-value"><select id="editStatus" class="dp-edit-select"><option value="正常" ${device.status==='正常'?'selected':''}>正常</option><option value="异常" ${device.status==='异常'?'selected':''}>异常</option><option value="维修中" ${device.status==='维修中'?'selected':''}>维修中</option></select></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">存放位置</div><div class="dp-field-value"><select id="editLocationStatus" class="dp-edit-select" onchange="toggleDestination()"><option value="in_stock" ${device.location_status==='in_stock'?'selected':''}>库存</option><option value="checked_out" ${device.location_status==='checked_out'?'selected':''}>已出库</option></select></div></div>
                <div class="dp-edit-field" id="editDestinationRow" style="${isCheckedOut?'':'display:none;'}"><div class="dp-edit-label">去向</div><div class="dp-field-value"><input type="text" id="editDestination" class="dp-edit-input" value="${escapeHtml(device.destination || '')}" placeholder="出库去向"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">入库时间</div><div class="dp-field-value"><input type="date" id="editCheckinTime" class="dp-edit-input" value="${device.checkin_time ? formatDateForInput(device.checkin_time) : ''}"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">到期日期</div><div class="dp-field-value"><input type="date" id="editExpiryDate" class="dp-edit-input" value="${device.expiry_date ? formatDateForInput(device.expiry_date) : ''}"></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">创建时间</div><div class="dp-field-value"><span style="color:var(--text-muted);font-size:var(--text-sm);">${device.created_at ? formatDateTime(device.created_at) : '-'}</span></div></div>
                <div class="dp-edit-field"><div class="dp-edit-label">更新时间</div><div class="dp-field-value"><span style="color:var(--text-muted);font-size:var(--text-sm);">${device.updated_at ? formatDateTime(device.updated_at) : '-'}</span></div></div>
                <div class="dp-edit-field" style="align-items:start;">
                    <div class="dp-edit-label" style="padding-top:8px;">附件</div>
                    <div class="dp-field-value">
                        <div class="dp-attachment-list" id="detailAttachmentsList"><div style="font-size:12px;color:var(--text-muted);padding:4px 0;">加载中...</div></div>
                        <button class="btn btn-secondary btn-sm" onclick="triggerUploadAttachment()" style="margin-top:10px;"><i class="bi bi-plus-lg"></i> 上传附件</button>
                    </div>
                </div>
                <div class="dp-edit-field" style="align-items:start;">
                    <div class="dp-edit-label">备注</div>
                    <div class="dp-field-value">
                        <button type="button" class="btn btn-secondary btn-sm" onclick="openRichTextEditorForDevice('${device.device_id}', '${escapeOnClick(device.name)}')" style="margin-bottom:8px;"><i class="bi bi-pencil-square"></i> 富文本编辑</button>
                        <textarea id="editRemark" class="dp-edit-textarea" rows="4">${escapeHtml(device.remark || '')}</textarea>
                    </div>
                </div>`;
            let actions = card.querySelector('.dp-card-actions');
            if (!actions) actions = card.querySelector('.dp-edit-actions');
            if (!actions) return;
            actions.className = 'dp-edit-actions';
            actions.innerHTML = `<button class="btn btn-primary" onclick="saveDeviceInline()"><i class="bi bi-check-lg"></i> 保存</button><button class="btn btn-secondary" onclick="cancelEdit()">取消</button>`;
            if (device.device_id) loadDeviceAttachments(device.device_id);
        }

        function toggleDestination() {
            const status = document.getElementById('editLocationStatus');
            const row = document.getElementById('editDestinationRow');
            if (status && row) row.style.display = status.value === 'checked_out' ? '' : 'none';
        }

        function formatDateForInput(timeStr) {
            if (!timeStr) return '';
            const d = new Date(timeStr);
            if (isNaN(d.getTime())) return '';
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        async function saveDeviceInline() {
            const id = currentDevice ? currentDevice.id : null;
            if (!id) { alert('设备数据异常'); return; }
            const locationStatus = document.getElementById('editLocationStatus')?.value || 'in_stock';
            const destination = locationStatus === 'checked_out' ? (document.getElementById('editDestination')?.value || '') : '';
            const checkinDate = document.getElementById('editCheckinTime')?.value || '';
            const expiryDate = document.getElementById('editExpiryDate')?.value || '';
            const data = {
                device_id: currentDevice.device_id || '',
                warehouseName: document.getElementById('editWarehouse')?.value || '',
                name: document.getElementById('editDeviceName')?.value || '',
                tag_names: document.getElementById('editTags')?.value || '',
                quantity: parseInt(document.getElementById('editQuantity')?.value) || 1,
                status: document.getElementById('editStatus')?.value || '正常',
                storage_location: currentDevice.storage_location || '',
                location_status: locationStatus,
                destination: destination,
                remark: document.getElementById('editRemark')?.value || '',
                checkin_time: checkinDate ? checkinDate + ' 00:00:00' : null,
                expiry_date: expiryDate || null,
                responsible_person: document.getElementById('editResponsiblePerson')?.value || '',
                department_path: document.getElementById('editDepartmentPath')?.value || '',
                serial_number: document.getElementById('editSerialNumber')?.value || '',
                spec_model: document.getElementById('editSpecModel')?.value || '',
                source: document.getElementById('editSource')?.value || ''
            };
            if (!data.name) { alert('请输入设备名称'); return; }
            try {
                const res = await fetch(`${API_BASE}/devices/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) { const errText = await res.text(); throw new Error(`HTTP ${res.status}: ${errText}`); }
                await loadDeviceDetail();
            } catch (e) { alert('保存失败: ' + e.message); }
        }

        function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
        function escapeOnClick(str) { return String(str || '').replace(/\\/g,'\\\\').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,"\\'"); }

        function openRichTextEditorForDevice(deviceIdCode, deviceName) {
            // 直接滚动到备注文本框并聚焦
            const textarea = document.getElementById('editRemark');
            if (textarea) {
                textarea.scrollIntoView({ behavior: 'smooth', block: 'center' });
                textarea.focus();
            }
        }

        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const units = ['B','KB','MB','GB'];
            let i = 0, size = bytes;
            while (size >= 1024 && i < units.length-1) { size /= 1024; i++; }
            return size.toFixed(i===0?0:1) + ' ' + units[i];
        }

        function getAttachmentIconClass(ext) {
            if (ext==='pdf') return 'pdf';
            if (/^docx?$/.test(ext)||ext==='doc') return 'doc';
            if (/^xlsx?$/.test(ext)||/^csv$/.test(ext)) return 'xls';
            if (/^(jpg|jpeg|png|gif|webp|bmp|svg)$/.test(ext)) return 'img';
            if (/^(zip|rar|7z|tar|gz)$/.test(ext)) return 'zip';
            return 'other';
        }

        async function loadDeviceAttachments(deviceId) {
            const container = document.getElementById('detailAttachmentsList');
            if (!container || !deviceId) { if (container) container.innerHTML = ''; return; }
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 15_000);
                const res = await fetch(`${API_BASE}/attachments/${deviceId}`, { signal: controller.signal });
                clearTimeout(timeout);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                if (!data.attachments || data.attachments.length === 0) {
                    container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:4px 0;">暂无附件</div>';
                    return;
                }
                container.innerHTML = data.attachments.map(a => {
                    const ext = (a.displayName || a.filename).split('.').pop().toLowerCase();
                    const iconClass = getAttachmentIconClass(ext);
                    const abbr = ext.toUpperCase().slice(0,3);
                    return `<div class="dp-attachment-item">
                        <i class="bi bi-check-circle-fill dp-check-icon"></i>
                        <div class="dp-attachment-icon ${iconClass}">${abbr}</div>
                        <div class="dp-attachment-info"><div class="dp-attachment-name"><a href="${a.url}" target="_blank" title="${a.displayName||a.filename}">${escapeHtml(a.displayName||a.filename)}</a></div><div class="dp-attachment-meta">${formatFileSize(a.size)}</div></div>
                        <div class="dp-attachment-actions"><button onclick="deleteAttachmentFile(this,'${deviceId}','${encodeURIComponent(a.filename)}')" class="btn-sm-delete"><i class="bi bi-trash3"></i> 删除</button></div>
                    </div>`;
                }).join('');
            } catch (err) {
                console.error('加载附件失败:', err);
                const msg = err.name === 'AbortError' ? '加载超时，请检查网络后刷新重试' : '加载失败';
                container.innerHTML = `<div style="font-size:12px;color:var(--danger);padding:4px 0;">${msg}</div>`;
            }
        }

        function triggerUploadAttachment() {
            const input = document.getElementById('attachmentFileInput');
            if (input) input.click();
        }

        async function handleAttachmentUpload(input) {
            const file = input.files[0];
            if (!file) return;
            if (!currentDevice || !currentDevice.device_id) { alert('无法获取设备ID'); input.value = ''; return; }
            const maxSize = 50*1024*1024;
            if (file.size > maxSize) { alert(`文件过大：${formatFileSize(file.size)}，附件不能超过 ${formatFileSize(maxSize)}`); input.value = ''; return; }
            const list = document.getElementById('detailAttachmentsList');
            if (list) list.innerHTML = '<div style="font-size:12px;color:var(--primary);padding:4px 0;"><span class="spinner-border spinner-border-sm" role="status"></span> 上传中...</div>';
            const formData = new FormData();
            formData.append('attachment', file);
            formData.append('deviceId', currentDevice.device_id);
            try {
                const res = await fetch(`${API_BASE}/upload/attachment`, { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || '上传失败');
                if (currentDevice.device_id) await loadDeviceAttachments(currentDevice.device_id);
            } catch (err) {
                console.error('上传失败:', err);
                alert('上传失败: ' + err.message);
                if (list) list.innerHTML = '<div style="font-size:12px;color:var(--danger);padding:4px 0;">上传失败</div>';
            }
            input.value = '';
        }

        async function deleteAttachmentFile(btn, deviceId, encodedFilename) {
            if (!confirm('确定要删除此附件吗？')) return;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" style="width:14px;height:14px;border-width:2px;"></span>';
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/attachments/${deviceId}/${encodedFilename}`, { method: 'DELETE' });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                loadDeviceAttachments(deviceId);
            } catch (err) {
                console.error('删除失败:', err);
                alert('删除失败: ' + err.message);
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        async function deleteDevice(id, name) {
            if (!confirm(`确定要删除设备"${name}"吗？`)) return;
            try {
                const res = await fetch(`${API_BASE}/devices/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('删除失败');
                alert('删除成功');
                window.location.href = 'index.html';
            } catch (e) { console.error('删除失败:', e); alert('删除失败: ' + e.message); }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadPublicConfig();
            loadDeviceDetail();
        });
    </script>
</body>
</html>
