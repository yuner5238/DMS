name: Sync from Gitee

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'  # 每6小时同步一次
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Gitee Repo
      uses: actions/checkout@v4
      with:
        repository: yuner5238/DMS
        token: ${{ secrets.GITEE_TOKEN }}
        fetch-depth: 0

    - name: Push to GitHub
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git remote add github https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yuner5238/DMS.git
        git push github HEAD:main --force
