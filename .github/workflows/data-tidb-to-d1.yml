name: Data - TiDB to D1

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Sync TiDB → D1
        run: node data-tidb-to-d1.js
        env:
          CF_EMAIL: ${{ secrets.CF_EMAIL }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          DB_TIDB_HOST: ${{ secrets.DB_TIDB_HOST }}
          DB_TIDB_PORT: ${{ secrets.DB_TIDB_PORT }}
          DB_TIDB_USER: ${{ secrets.DB_TIDB_USER }}
          DB_TIDB_PASSWORD: ${{ secrets.DB_TIDB_PASSWORD }}
          DB_TIDB_DATABASE: ${{ secrets.DB_TIDB_DATABASE }}
